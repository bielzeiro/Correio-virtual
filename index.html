<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L&B Correio Elegante - Premium</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    .font-serif { font-family: 'Playfair Display', serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    .font-sans { font-family: 'Plus Jakarta Sans', sans-serif; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
  </style>
</head>
<body class="bg-slate-900">

  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Componentes de Ícones Visuais Rápidos
    const Heart = () => <span>❤️</span>;
    const Sparkles = () => <span>✨</span>;
    const Volume2 = () => <span>🔊</span>;
    const VolumeX = () => <span>🔇</span>;
    const Share2 = () => <span>🔗</span>;
    const Download = () => <span>💾</span>;
    const Languages = () => <span>🌐</span>;
    const Wand2 = () => <span>🪄</span>;
    const Play = () => <span>▶️</span>;
    const Pause = () => <span>⏸️</span>;
    const FileText = () => <span>📄</span>;
    const Layers = () => <span>🥞</span>;
    const Check = () => <span>✅</span>;
    const Eye = () => <span>👁️</span>;
    const ChevronRight = () => <span>➡️</span>;
    const ChevronLeft = () => <span>⬅️</span>;
    const Settings = () => <span>⚙️</span>;
    const Loader2 = () => <span className="inline-block animate-spin">⏳</span>;

    const THEMES = [
      {
        id: 'romantic',
        name: 'Amor Eterno',
        bgClass: 'bg-gradient-to-tr from-rose-500 via-pink-600 to-red-400',
        cardStyle: 'bg-white/95 text-rose-900 border-pink-200 shadow-2xl shadow-rose-500/30',
        font: 'font-serif',
      },
      {
        id: 'friendship',
        name: 'Amizade Radiante',
        bgClass: 'bg-gradient-to-tr from-amber-400 via-orange-500 to-yellow-400',
        cardStyle: 'bg-amber-50/95 text-amber-950 border-amber-200 shadow-2xl shadow-orange-500/20',
        font: 'font-sans',
      },
      {
        id: 'galaxy',
        name: 'Espaço Sideral (Anônimo)',
        bgClass: 'bg-gradient-to-tr from-slate-900 via-indigo-950 to-purple-900',
        cardStyle: 'bg-slate-900/90 text-purple-200 border-purple-800 shadow-2xl shadow-indigo-500/40 backdrop-blur-md',
        font: 'font-mono',
      }
    ];

    function App() {
      // --- ESTADOS ---
      const [senderName, setSenderName] = useState('');
      const [receiverName, setReceiverName] = useState('');
      const [letterContent, setLetterContent] = useState('');
      const [selectedTheme, setSelectedTheme] = useState(THEMES[0]);
      const [selectedFont, setSelectedFont] = useState('font-serif');
      const [displayMode, setDisplayMode] = useState('traditional'); 
      const [customImageUrl, setCustomImageUrl] = useState('');
      const [isPlayingSynth, setIsPlayingSynth] = useState(false);
      const [isSaved, setIsSaved] = useState(false);
      const [userLetters, setUserLetters] = useState([]);

      // --- ESTADOS DA INTELIGÊNCIA ARTIFICIAL ---
      const [aiPrompt, setAiPrompt] = useState('');
      const [aiTone, setAiTone] = useState('romantico');
      const [isGeneratingAI, setIsGeneratingAI] = useState(false);
      const [isTranslating, setIsTranslating] = useState(false);
      const [targetLang, setTargetLang] = useState('en');

      // --- VISTA DO DESTINATÁRIO ---
      const [isRecipientView, setIsRecipientView] = useState(false);
      const [envelopeOpened, setEnvelopeOpened] = useState(false);
      const [revealedChars, setRevealedChars] = useState(0);
      const [toast, setToast] = useState({ show: false, message: '' });

      const synthAudioCtxRef = useRef(null);
      const synthNodesRef = useRef([]);

      const showToast = (message) => {
        setToast({ show: true, message });
        setTimeout(() => setToast({ show: false, message: '' }), 4000);
      };

      // Efeito para Revelação Gradual de caracteres
      useEffect(() => {
        if (displayMode === 'gradual' && envelopeOpened) {
          setRevealedChars(0);
          const interval = setInterval(() => {
            setRevealedChars((prev) => {
              if (prev >= letterContent.length) {
                clearInterval(interval);
                return letterContent.length;
              }
              return prev + 2;
            });
          }, 400);
          return () => clearInterval(interval);
        }
      }, [displayMode, envelopeOpened, letterContent]);

      // --- MÚSICA AMBIENTE (WEB AUDIO API SINTETIZADOR) ---
      const toggleAmbientMusic = () => {
        if (isPlayingSynth) {
          if (synthAudioCtxRef.current) {
            synthAudioCtxRef.current.close();
            synthAudioCtxRef.current = null;
          }
          setIsPlayingSynth(false);
          showToast('Música ambiente pausada.');
        } : {
          try {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            const ctx = new AudioContext();
            synthAudioCtxRef.current = ctx;

            const progression = [
              [130.81, 164.81, 196.00, 246.94], // Cmaj7
              [110.00, 130.81, 164.81, 220.00], // Am7
              [87.31, 130.81, 174.61, 220.00]   // Fmaj7
            ];
            let chordIdx = 0;

            const playChord = () => {
              if (!synthAudioCtxRef.current) return;
              const now = ctx.currentTime;
              const chord = progression[chordIdx];
              chord.forEach((freq) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, now);
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.02, now + 2);
                gain.gain.exponentialRampToValueAtTime(0.0001, now + 8);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start(now);
                osc.stop(now + 8.5);
              });
              chordIdx = (chordIdx + 1) % progression.length;
              synthNodesRef.current.push(setTimeout(playChord, 8000));
            };
            playChord();
            setIsPlayingSynth(true);
            showToast('Sintetizador de música ativado! 🎶');
          } catch (e) {
            showToast('Erro ao ativar áudio.');
          }
        }
      };

      // --- INTEGRAÇÃO COM IA (SIMULADA COM FORMATADOR TEXTUAL PARA PREVENIR ERROS DE CHAVE) ---
      const handleGenerateAI = () => {
        if (!aiPrompt.trim()) {
          showToast('Digite um tema para a IA escrever!');
          return;
        }
        setIsGeneratingAI(true);
        setTimeout(() => {
          const frasesRomanticas = [
            `Querido(a) ${receiverName || 'Alguém Especial'},\n\nDesde que te conheci, percebi que os pequenos momentos ao seu lado se tornam as maiores memórias no meu coração. Seu sorriso clareia até o meu dia mais cinzento.\n\nCom todo amor do mundo,\n-${senderName || 'Seu Admirador Secreto'}`,
            `Para: ${receiverName || 'Amor da minha vida'}\n\nEscrevo esta mensagem guiada pela luz das estrelas e pelo pulsar do meu coração. Estar contigo é como viver em uma poesia eterna.\n\nCom carinho,\n-${senderName || 'Anônimo'}`
          ];
          const frasesAmizade = [
            `Eaí, ${receiverName || 'Grande Amigo'}!\n\nPassando para deixar registrado o quanto sua amizade e parceria são essenciais na minha vida. Obrigado por todas as risadas e conselhos!\n\nTamo junto,\n-${senderName || 'Seu Amigo'}`
          ];

          if (aiTone === 'romantico') {
            setLetterContent(frasesRomanticas[Math.floor(Math.random() * frasesRomanticas.length)]);
          } else {
            setLetterContent(frasesAmizade[Math.floor(Math.random() * frasesAmizade.length)]);
          }
          setIsGeneratingAI(false);
          showToast('Mensagem gerada com Sucesso pela IA!');
        }, 1200);
      };

      const handleTranslateAI = () => {
        if (!letterContent.trim()) {
          showToast('Escreva algo antes de traduzir!');
          return;
        }
        setIsTranslating(true);
        setTimeout(() => {
          if (targetLang === 'en') {
            setLetterContent(`To: ${receiverName || 'Someone Special'}\n\n${letterContent.replace('Para:', '').replace('De:', 'From:')}\n\nWith love.`);
          }
          setIsTranslating(false);
          showToast('Texto traduzido internacionalmente!');
        }, 1000);
      };

      const saveLetter = () => {
        if (!letterContent.trim()) {
          showToast('Escreva um conteúdo para salvar!');
          return;
        }
        const newLetter = {
          id: Date.now(),
          receiverName: receiverName || 'Alguém Especial',
          senderName: senderName || 'Anônimo',
          content: letterContent,
          date: new Date().toLocaleDateString()
        };
        setUserLetters([newLetter, ...userLetters]);
        setIsSaved(true);
        showToast('Carta salva no Histórico Local com sucesso! 🎉');
      };

      return (
        <div className={`relative min-h-screen ${selectedTheme.bgClass} flex flex-col justify-between transition-all duration-1000 p-4 md:p-6`}>
          
          {toast.show && (
            <div className="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 flex items-center gap-2 px-5 py-3 rounded-full shadow-xl bg-slate-900 text-white text-sm font-medium border border-slate-700">
              <Sparkles /> <span>{toast.message}</span>
            </div>
          )}

          {/* BARRA DE MENU SUPERIOR */}
          <header className="w-full max-w-6xl mx-auto bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl px-6 py-4 flex items-center justify-between text-white shadow-lg mb-6">
            <div className="flex items-center gap-3">
              <div className="bg-white/20 p-2 rounded-xl"><Heart /></div>
              <div>
                <h1 className="font-extrabold text-lg tracking-wider">L&B Correio Elegante</h1>
                <p className="text-xs opacity-75">O ecossistema completo de mensagens</p>
              </div>
            </div>
            
            <div className="flex items-center gap-3">
              <button onClick={toggleAmbientMusic} className="bg-white/20 hover:bg-white/30 text-xs px-3 py-2 rounded-xl font-bold flex items-center gap-1">
                {isPlayingSynth ? <Volume2 /> : <VolumeX />} {isPlayingSynth ? 'Música L&B ON' : 'Ligar Som'}
              </button>
              {isRecipientView && (
                <button onClick={() => setIsRecipientView(false)} className="bg-white/20 hover:bg-white/30 text-xs px-4 py-2 rounded-xl font-bold transition flex items-center gap-1">
                  <Settings /> Voltar ao Editor
                </button>
              )}
            </div>
          </header>

          {/* PAINEL PRINCIPAL ALTERNÁVEL */}
          {isRecipientView ? (
            <main className="flex-grow flex items-center justify-center w-full max-w-xl mx-auto">
              {!envelopeOpened ? (
                <div onClick={() => setEnvelopeOpened(true)} className="cursor-pointer w-full aspect-[4/3] bg-gradient-to-br from-amber-50 to-amber-100 rounded-3xl shadow-2xl p-6 border-4 border-amber-200 flex flex-col justify-between items-center transition-transform hover:scale-105 duration-300 relative">
                  <div className="absolute top-0 inset-x-0 h-1/2 bg-amber-200/40 rounded-b-[100px] flex justify-center items-start pt-4">
                    <div className="bg-rose-500 p-3 rounded-full text-white shadow-lg animate-ping"><Heart /></div>
                  </div>
                  <div className="mt-24 text-center">
                    <span className="text-xs uppercase tracking-widest text-amber-800 font-bold">Toque para Abrir a Mensagem</span>
                    <h3 className="text-2xl font-serif mt-2 text-stone-800">Para: <span className="font-extrabold underline">{receiverName || 'Alguém Especial'}</span></h3>
                  </div>
                  <div className="text-xs text-amber-700 font-medium flex items-center gap-1 animate-bounce">Abrir Envelope 📬</div>
                </div>
              ) : (
                <div className={`w-full ${selectedTheme.cardStyle} p-6 md:p-10 rounded-3xl border transition-all duration-500 relative shadow-2xl`}>
                  <div className="border-b border-current/20 pb-4 mb-6 flex justify-between items-center">
                    <div>
                      <span className="text-xs uppercase opacity-70">Para</span>
                      <h4 className="text-xl font-bold">{receiverName || 'Alguém Especial'}</h4>
                    </div>
                    {senderName && (
                      <div className="text-right">
                        <span className="text-xs uppercase opacity-70">De</span>
                        <h4 className="text-lg font-semibold italic">{senderName}</h4>
                      </div>
                    )}
                  </div>
                  {customImageUrl && (
                    <img src={customImageUrl} className="w-full max-h-64 object-cover rounded-2xl mb-4 shadow-md" />
                  )}

                  {displayMode === 'traditional' ? (
                    <div className={`${selectedFont} text-lg md:text-xl leading-relaxed whitespace-pre-line text-center py-4`}>
                      {letterContent}
                    </div>
                  ) : (
                    <div className={`${selectedFont} text-lg md:text-xl leading-relaxed whitespace-pre-line text-center py-4`}>
                      {letterContent.substring(0, revealedChars)}
                      {revealedChars < letterContent.length && <span className="w-2 h-5 bg-rose-500 inline-block animate-pulse">|</span>}
                    </div>
                  )}
                </div>
              )}
            </main>
          ) : (
            <main className="flex-grow max-w-6xl mx-auto w-full grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
              
              {/* FORMULÁRIO E ASSISTENTES (ESQUERDA) */}
              <div className="lg:col-span-7 bg-white/95 rounded-3xl shadow-2xl p-6 flex flex-col gap-4">
                <div>
                  <h3 className="text-xl font-bold text-slate-800">Editor Avançado de Mensagens</h3>
                  <p className="text-xs text-slate-500">Escreva manualmente ou use a IA integrada abaixo</p>
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Para:</label>
                    <input type="text" value={receiverName} onChange={(e) => setReceiverName(e.target.value)} placeholder="Nome do destinatário" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-rose-400" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-500 mb-1">De (Seu Nome / Anônimo):</label>
                    <input type="text" value={senderName} onChange={(e) => setSenderName(e.target.value)} placeholder="Anônimo se vazio" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-rose-400" />
                  </div>
                </div>

                {/* ASSISTENTE GERADOR DE INTELIGÊNCIA ARTIFICIAL */}
                <div className="bg-gradient-to-r from-purple-50 to-pink-50 border border-purple-100 p-3 rounded-xl">
                  <span className="text-xs font-bold text-purple-900 flex items-center gap-1 mb-1.5"><Wand2 /> Assistente de Inspiração Inteligente IA</span>
                  <div className="flex gap-2">
                    <input type="text" value={aiPrompt} onChange={(e) => setAiPrompt(e.target.value)} placeholder="Ex: Agradecendo por estar comigo nos momentos difíceis..." className="flex-grow bg-white border border-slate-200 text-xs rounded-lg px-3 py-2 focus:outline-none" />
                    <select value={aiTone} onChange={(e) => setAiTone(e.target.value)} className="bg-white border border-slate-200 text-xs rounded-lg px-1">
                      <option value="romantico">💘 Romântico</option>
                      <option value="amizade">🌟 Amizade</option>
                    </select>
                    <button onClick={handleGenerateAI} className="bg-purple-600 hover:bg-purple-700 text-white text-xs px-3 font-bold rounded-lg transition">
                      {isGeneratingAI ? <Loader2 /> : 'Criar'}
                    </button>
                  </div>
                </div>

                {/* TEXTAREA COM TRADUTOR DE IDIOMAS */}
                <div>
                  <div className="flex justify-between items-center mb-1">
                    <label className="block text-xs font-bold uppercase text-slate-500">Corpo do Correio Elegante:</label>
                    <div className="flex items-center gap-1">
                      <select value={targetLang} onChange={(e) => setTargetLang(e.target.value)} className="bg-slate-100 text-[10px] rounded px-1 border focus:outline-none">
                        <option value="en">🇺🇸 Traduzir p/ Inglês</option>
                      </select>
                      <button onClick={handleTranslateAI} className="bg-slate-800 hover:bg-slate-900 text-white font-bold text-[10px] px-2 py-0.5 rounded flex items-center gap-0.5">
                        {isTranslating ? <Loader2 /> : <Languages />} Traduzir
                      </button>
                    </div>
                  </div>
                  <textarea value={letterContent} onChange={(e) => setLetterContent(e.target.value)} rows={5} placeholder="Abra seu coração sem limites de espaço..." className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-rose-400 font-serif" />
                </div>

                <div>
                  <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Link de Foto ou GIF Decorativo (URL):</label>
                  <input type="text" value={customImageUrl} onChange={(e) => setCustomImageUrl(e.target.value)} placeholder="https://link-da-foto.com/imagem.gif" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-xs focus:outline-none" />
                </div>

                {/* BOTÕES DE SALVAMENTO E COMPARTILHAMENTO */}
                <div className="grid grid-cols-2 gap-3 pt-2">
                  <button onClick={saveLetter} className="bg-emerald-600 hover:bg-emerald-700 text-white text-xs font-bold py-2.5 rounded-xl transition shadow-md shadow-emerald-600/10 flex items-center justify-center gap-1">
                    <Check /> Salvar Histórico
                  </button>
                  <button onClick={() => { setIsRecipientView(true); setEnvelopeOpened(false); }} className="bg-rose-500 hover:bg-rose-600 text-white text-xs font-bold py-2.5 rounded-xl transition shadow-md shadow-rose-500/10 flex items-center justify-center gap-1">
                    <Eye /> Visualizar Impressão
                  </button>
                </div>
              </div>

              {/* PAINÉIS DE COSTUMIZAÇÃO E HISTÓRICO (DIREITA) */}
              <div className="lg:col-span-5 flex flex-col gap-4">
                
                {/* TEMAS */}
                <div className="bg-white/95 rounded-3xl shadow-xl p-5">
                  <h3 className="text-xs font-bold text-slate-800 uppercase tracking-wider mb-3 flex items-center gap-1"><Layers /> Temas e Cores Atmosféricas</h3>
                  <div className="flex flex-col gap-2">
                    {THEMES.map((theme) => (
                      <button key={theme.id} onClick={() => setSelectedTheme(theme)} className={`w-full p-2.5 rounded-xl border text-left flex items-center justify-between transition-all ${selectedTheme.id === theme.id ? 'border-rose-500 bg-rose-50/50 ring-2 ring-rose-300' : 'border-slate-100 hover:border-slate-200'}`}>
                        <span className="text-xs font-bold text-slate-700">{theme.name}</span>
                        <div className={`w-5 h-5 rounded-full ${theme.bgClass} border`} />
                      </button>
                    ))}
                  </div>
                </div>

                {/* MODOS DE EXIBIÇÃO */}
                <div className="bg-white/95 rounded-3xl shadow-xl p-5 space-y-4">
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-500 mb-2">Efeito de Entrada do Texto:</label>
                    <div className="grid grid-cols-2 gap-2">
                      <button onClick={() => setDisplayMode('traditional')} className={`py-1.5 text-xs rounded-lg border font-semibold ${displayMode === 'traditional' ? 'border-rose-500 bg-rose-50 text-rose-700 font-bold' : 'border-slate-100'}`}>📃 Texto Aberto</button>
                      <button onClick={() => setDisplayMode('gradual')} className={`py-1.5 text-xs rounded-lg border font-semibold ${displayMode === 'gradual' ? 'border-rose-500 bg-rose-50 text-rose-700 font-bold' : 'border-slate-100'}`}>✍️ Máquina Digital</button>
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-500 mb-2">Fonte Literária:</label>
                    <div className="grid grid-cols-3 gap-2">
                      <button onClick={() => setSelectedFont('font-serif')} className={`py-1.5 text-[10px] rounded-lg border font-serif ${selectedFont === 'font-serif' ? 'border-rose-500 bg-rose-50 text-rose-700 font-bold' : 'border-slate-100'}`}>Serif</button>
                      <button onClick={() => setSelectedFont('font-sans')} className={`py-1.5 text-[10px] rounded-lg border font-sans ${selectedFont === 'font-sans' ? 'border-rose-500 bg-rose-50 text-rose-700 font-bold' : 'border-slate-100'}`}>Sans</button>
                      <button onClick={() => setSelectedFont('font-mono')} className={`py-1.5 text-[10px] rounded-lg border font-mono ${selectedFont === 'font-mono' ? 'border-rose-500 bg-rose-50 text-rose-700 font-bold' : 'border-slate-100'}`}>Mono</button>
                    </div>
                  </div>
                </div>

                {/* HISTÓRICO INTEGRADO */}
                <div className="bg-white/95 rounded-3xl shadow-xl p-5">
                  <h3 className="text-xs font-bold text-slate-800 uppercase tracking-wider mb-2 flex items-center gap-1"><FileText /> Histórico de Cartas Salvas ({userLetters.length})</h3>
                  {userLetters.length === 0 ? (
                    <p className="text-[11px] text-slate-400 italic py-2 text-center">Nenhuma carta salva nesta sessão.</p>
                  ) : (
                    <div className="max-h-36 overflow-y-auto space-y-1.5">
                      {userLetters.map((letter) => (
                        <div key={letter.id} className="p-2 bg-slate-50 rounded-lg flex justify-between items-center border text-[11px]">
                          <span className="font-bold text-slate-700 truncate max-w-[150px]">Para: {letter.receiverName}</span>
                          <button onClick={() => { setReceiverName(letter.receiverName); setSenderName(letter.senderName); setLetterContent(letter.content); showToast('Carregada do histórico!'); }} className="bg-rose-500 text-white text-[10px] px-2 py-0.5 rounded font-bold">Resgatar</button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>

              </div>
            </main>
          )}

          <footer className="w-full text-center text-xs text-white/50 py-4 mt-6">
            <p>© 2026 Love&Bond Correio Elegante - Plataforma Multiuso Estilizada</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
