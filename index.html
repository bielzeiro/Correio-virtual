<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Correio Virtual</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Playfair+Display:ital,wght=0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght=0,400;0,600;0,700;1,400&family=Cinzel:wght@400;700&family=Sacramento&family=Montserrat:wght@400;600&family=Caveat:wght@400;700&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    .font-serif { font-family: 'Playfair Display', Georgia, serif; }
    .font-mono { font-family: 'JetBrains Mono', Courier, monospace; }
    .font-sans { font-family: 'Plus Jakarta Sans', sans-serif; }
    .font-cinzel { font-family: 'Cinzel', serif; }
    .font-sacramento { font-family: 'Sacramento', cursive; }
    .font-montserrat { font-family: 'Montserrat', sans-serif; }
    .font-caveat { font-family: 'Caveat', cursive; }
  </style>
</head>
<body class="bg-slate-900 text-slate-800 antialiased min-h-screen overflow-x-hidden">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const firebaseConfig = { 
      apiKey: "", 
      authDomain: "", 
      projectId: "", 
      storageBucket: "", 
      messagingSenderId: "", 
      appId: "" 
    };

    let app, auth, db;
    if (firebaseConfig.apiKey) {
      try {
        app = firebase.initializeApp(firebaseConfig);
        auth = firebase.auth();
        db = firebase.firestore();
      } catch (e) {
        console.error("Erro ao inicializar Firebase:", e);
      }
    }
    const appId = 'correio-elegante-default';

    // Ícones
    const Heart = ({ className = "w-5 h-5" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
    );
    const Sparkles = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="inline-block w-4 h-4 text-yellow-400"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275Z"/></svg>
    );
    const Volume2 = ({ className = "w-4 h-4" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
    );
    const VolumeX = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="inline-block w-4 h-4"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="22" x2="16" y1="9" y2="15"/><line x1="16" x2="22" y1="9" y2="15"/></svg>
    );
    const Share2 = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="inline-block w-5 h-5"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" x2="15.42" y1="13.51" y2="17.49"/><line x1="15.41" x2="8.59" y1="6.51" y2="10.49"/></svg>
    );
    const Download = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="inline-block w-3.5 h-3.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
    );
    const FileText = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="inline-block w-4 h-4 text-rose-500"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><polyline points="14 2 14 7 20 7"/><line x1="10" x2="14" y1="13" y2="13"/><line x1="10" x2="14" y1="17" y2="17"/><line x1="10" x2="11" y1="9" y2="9"/></svg>
    );
    const Layers = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="inline-block w-4 h-4 text-rose-500"><path d="m12 3-8 4 8 4 8-4-8-4Z"/><path d="m4 12 8 4 8-4"/><path d="m4 16 8 4 8-4"/></svg>
    );
    const Check = ({ className = "w-5 h-5" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><polyline points="20 6 9 17 4 12"/></svg>
    );
    const Eye = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="inline-block w-3.5 h-3.5"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0Z"/><circle cx="12" cy="12" r="3"/></svg>
    );
    const ChevronRight = ({ className = "w-4 h-4" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={`inline-block ${className}`}><polyline points="9 18 15 12 9 6"/></svg>
    );
    const ChevronLeft = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="inline-block w-5 h-5"><polyline points="15 18 9 12 15 6"/></svg>
    );
    const Settings = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="inline-block w-3.5 h-3.5"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
    );

    const THEMES = [
      {
        id: 'romantic',
        name: 'Amor Eterno',
        bgClass: 'bg-gradient-to-tr from-rose-500 via-pink-600 to-red-400',
        particleColor: '#ff4d6d',
        accentColor: 'text-rose-600'
      },
      {
        id: 'cyberpunk',
        name: 'Futurista Cíber',
        bgClass: 'bg-gradient-to-tr from-purple-900 via-violet-950 to-fuchsia-900',
        particleColor: '#d946ef',
        accentColor: 'text-fuchsia-400'
      },
      {
        id: 'sunset',
        name: 'Pôr do Sol Dourado',
        bgClass: 'bg-gradient-to-tr from-amber-600 via-orange-500 to-rose-500',
        particleColor: '#f97316',
        accentColor: 'text-amber-700'
      },
      {
        id: 'friendship',
        name: 'Amizade Radiante',
        bgClass: 'bg-gradient-to-tr from-amber-400 via-orange-500 to-yellow-400',
        particleColor: '#f77f00',
        accentColor: 'text-amber-700'
      },
      {
        id: 'galaxy',
        name: 'Espaço Sideral',
        bgClass: 'bg-gradient-to-tr from-slate-900 via-indigo-950 to-purple-900',
        particleColor: '#a78bfa',
        accentColor: 'text-purple-400'
      }
    ];

    const FONTS = [
      { id: 'font-serif', name: 'Clássico Serif' },
      { id: 'font-sans', name: 'Moderno Sans' },
      { id: 'font-mono', name: 'Tech Código' },
      { id: 'font-cinzel', name: 'Cinzel Real' },
      { id: 'font-sacramento', name: 'Sacramento Cursiva' },
      { id: 'font-montserrat', name: 'Montserrat Clean' },
      { id: 'font-caveat', name: 'Caveat Manuscrita' }
    ];

    // Configurações Customizáveis de Cores de Envelope e Cartas
    const ENVELOPE_COLORS = [
      { id: 'bg-gradient-to-br from-amber-50 to-amber-100 border-amber-200 text-stone-800', name: 'Marfim Clássico' },
      { id: 'bg-gradient-to-br from-rose-100 to-rose-200 border-rose-300 text-rose-900', name: 'Rosa Delicado' },
      { id: 'bg-gradient-to-br from-red-600 to-red-700 border-red-800 text-white', name: 'Vermelho Paixão' },
      { id: 'bg-gradient-to-br from-slate-800 to-slate-900 border-slate-700 text-slate-100', name: 'Preto Elegante' },
      { id: 'bg-gradient-to-br from-blue-900 to-indigo-950 border-blue-800 text-indigo-100', name: 'Azul Nobre' }
    ];

    const CARD_COLORS = [
      { id: 'bg-white/95 text-stone-900 border-stone-200 shadow-xl rounded-3xl border shadow-2xl', name: 'Branco Puro' },
      { id: 'bg-amber-50/98 text-stone-800 border-stone-300 border-2 rounded-2xl p-8', name: 'Pergaminho Retro' },
      { id: 'bg-rose-50/95 text-rose-950 border-pink-200 shadow-rose-500/10 rounded-3xl border', name: 'Rosa Suave' },
      { id: 'bg-neutral-900/90 text-cyan-400 border-cyan-500 border-2 rounded-2xl shadow-cyan-500/20', name: 'Modo Escuro Neon' },
      { id: 'bg-stone-100 text-amber-950 border-t-8 border-t-orange-500 rounded-xl', name: 'Borda Laranja Terracota' }
    ];

    function App() {
      const [user, setUser] = useState(null);
      const [userLetters, setUserLetters] = useState([]);
      const [loadingAuth, setLoadingAuth] = useState(true);

      const [senderName, setSenderName] = useState('');
      const [receiverName, setReceiverName] = useState('');
      const [letterContent, setLetterContent] = useState('');
      const [selectedTheme, setSelectedTheme] = useState(THEMES[0]);
      const [selectedFont, setSelectedFont] = useState('font-serif');
      const [displayMode, setDisplayMode] = useState('traditional'); 
      const [customImageUrl, setCustomImageUrl] = useState('');
      const [isSaved, setIsSaved] = useState(false);
      const [currentLetterId, setCurrentLetterId] = useState('');

      // Estados de personalização do usuário
      const [envelopeStyle, setEnvelopeStyle] = useState(ENVELOPE_COLORS[0].id);
      const [cardStyle, setCardStyle] = useState(CARD_COLORS[0].id);

      const [isRecipientView, setIsRecipientView] = useState(false);
      const [envelopeOpened, setEnvelopeOpened] = useState(false);
      const [currentSlide, setCurrentSlide] = useState(0);
      const [revealedChars, setRevealedChars] = useState(0);

      const [toast, setToast] = useState({ show: false, message: '' });
      const [copySuccess, setCopySuccess] = useState(false);
      
      const canvasRef = useRef(null);
      const fileInputRef = useRef(null);
      const audioBackgroundRef = useRef(new Audio());

      const [isPlayingAudio, setIsPlayingAudio] = useState(false);
      const [audioFileName, setAudioFileName] = useState('');

      useEffect(() => {
        audioBackgroundRef.current.loop = true;
        return () => {
          audioBackgroundRef.current.pause();
        };
      }, []);

      const playEnvelopeSound = () => {
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;
          const ctx = new AudioContext();
          
          const bufferSize = ctx.sampleRate * 0.4; 
          const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
          }

          const noise = ctx.createBufferSource();
          noise.buffer = buffer;

          const filter = ctx.createBiquadFilter();
          filter.type = 'bandpass';
          filter.frequency.setValueAtTime(1000, ctx.currentTime);
          filter.frequency.exponentialRampToValueAtTime(300, ctx.currentTime + 0.3);

          const gain = ctx.createGain();
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);

          noise.connect(filter);
          filter.connect(gain);
          gain.connect(ctx.destination);

          noise.start();
        } catch (e) {
          console.warn("AudioContext bloqueado.");
        }
      };

      const handleEnvelopeOpenClick = () => {
        playEnvelopeSound();
        setEnvelopeOpened(true);
      };

      const handleAudioUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          setAudioFileName(file.name);
          const url = URL.createObjectURL(file);
          audioBackgroundRef.current.src = url;
          audioBackgroundRef.current.play()
            .then(() => {
              setIsPlayingAudio(true);
              showToast('Música carregada!');
            })
            .catch(() => {
              showToast('Erro ao reproduzir áudio.');
            });
        }
      };

      // Carregar arquivo de imagem local do dispositivo
      const handleImageDeviceUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            setCustomImageUrl(reader.result);
            showToast('Imagem adicionada com sucesso!');
          };
          reader.readAsDataURL(file);
        }
      };

      const toggleAudioPlay = () => {
        if (!audioBackgroundRef.current.src) {
          fileInputRef.current.click();
          return;
        }
        if (isPlayingAudio) {
          audioBackgroundRef.current.pause();
          setIsPlayingAudio(false);
          showToast('Música pausada.');
        } else {
          audioBackgroundRef.current.play();
          setIsPlayingAudio(true);
          showToast('Música retomada.');
        }
      };

      // --- AUTENTICAÇÃO ANÔNIMA ---
      useEffect(() => {
        if (!auth) {
          setLoadingAuth(false);
          return;
        }
        auth.signInAnonymously()
          .catch(err => console.error("Erro na autenticação:", err))
          .finally(() => setLoadingAuth(false));

        const unsubscribe = auth.onAuthStateChanged((usr) => {
          setUser(usr);
        });
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (user) fetchUserLetters();
      }, [user]);

      useEffect(() => {
        const handleHashChange = () => {
          const hash = window.location.hash;
          if (hash.startsWith('#/letter/')) {
            const id = hash.replace('#/letter/', '');
            loadLetterFromDb(id);
          }
        };
        window.addEventListener('hashchange', handleHashChange);
        handleHashChange();
        return () => window.removeEventListener('hashchange', handleHashChange);
      }, []);

      // --- CANVAS DE PARTÍCULAS ---
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let animationFrameId;

        const resizeCanvas = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        };
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let particles = [];
        for (let i = 0; i < 45; i++) {
          particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height + canvas.height,
            size: Math.random() * 8 + 4,
            speedY: -(Math.random() * 1.5 + 0.5),
            speedX: Math.random() * 1 - 0.5,
            opacity: Math.random() * 0.5 + 0.2,
            wobble: Math.random() * 100,
            wobbleSpeed: Math.random() * 0.02 + 0.01
          });
        }

        const draw = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          particles.forEach((p) => {
            p.y += p.speedY;
            p.x += p.speedX + Math.sin(p.wobble) * 0.5;
            p.wobble += p.wobbleSpeed;

            if (p.y < -20) {
              p.y = canvas.height + 20;
              p.x = Math.random() * canvas.width;
            }

            ctx.save();
            ctx.globalAlpha = p.opacity;
            ctx.fillStyle = selectedTheme.particleColor;

            if (selectedTheme.id === 'romantic' || selectedTheme.id === 'sunset') {
              ctx.beginPath();
              const d = p.size;
              ctx.moveTo(p.x, p.y + d / 4);
              ctx.quadraticCurveTo(p.x, p.y, p.x + d / 2, p.y);
              ctx.quadraticCurveTo(p.x + d, p.y, p.x + d, p.y + d / 3);
              ctx.quadraticCurveTo(p.x + d, p.y + d * (2/3), p.x + d / 2, p.y + d);
              ctx.quadraticCurveTo(p.x, p.y + d * (2/3), p.x, p.y + d / 3);
              ctx.quadraticCurveTo(p.x, p.y, p.x, p.y + d / 4);
              ctx.closePath();
              ctx.fill();
            } else if (selectedTheme.id === 'galaxy' || selectedTheme.id === 'cyberpunk') {
              ctx.beginPath();
              ctx.moveTo(p.x, p.y - p.size);
              ctx.lineTo(p.x + p.size/3, p.y - p.size/3);
              ctx.lineTo(p.x + p.size, p.y);
              ctx.lineTo(p.x + p.size/3, p.y + p.size/3);
              ctx.lineTo(p.x, p.y + p.size);
              ctx.lineTo(p.x - p.size/3, p.y + p.size/3);
              ctx.lineTo(p.x - p.size, p.y);
              ctx.lineTo(p.x - p.size/3, p.y - p.size/3);
              ctx.closePath();
              ctx.fill();
            } else {
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.size / 2, 0, Math.PI * 2);
              ctx.fill();
            }
            ctx.restore();
          });
          animationFrameId = requestAnimationFrame(draw);
        };
        draw();

        return () => {
          cancelAnimationFrame(animationFrameId);
          window.removeEventListener('resize', resizeCanvas);
        };
      }, [selectedTheme]);

      // --- REVELAÇÃO GRADUAL ---
      useEffect(() => {
        if (displayMode === 'gradual' && envelopeOpened) {
          setRevealedChars(0);
          const interval = setInterval(() => {
            setRevealedChars((prev) => {
              if (prev >= letterContent.length) {
                clearInterval(interval);
                return letterContent.length;
              }
              return prev + 2;
            });
          }, 50);
          return () => clearInterval(interval);
        }
      }, [displayMode, envelopeOpened, letterContent]);

      // --- FIRESTORE ---
      const fetchUserLetters = async () => {
        if (!db || !user) return;
        try {
          const snap = await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('saved_letters').get();
          const list = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setUserLetters(list);
        } catch (err) {
          console.error(err);
        }
      };

      const saveLetter = async () => {
        if (!db || !user) {
          showToast('Banco de dados indisponível no momento.');
          return;
        }
        if (!letterContent.trim()) {
          showToast('Escreva sua mensagem antes de salvar.');
          return;
        }
        try {
          const data = {
            senderName,
            receiverName,
            letterContent,
            themeId: selectedTheme.id,
            font: selectedFont,
            displayMode,
            customImageUrl,
            envelopeStyle,
            cardStyle,
            createdAt: new Date().toISOString()
          };

          const publicRef = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('letters').add(data);
          await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('saved_letters').doc(publicRef.id).set(data);

          setCurrentLetterId(publicRef.id);
          setIsSaved(true);
          fetchUserLetters();
          showToast('Carta arquivada online!');
        } catch (err) {
          console.error(err);
          showToast('Erro ao arquivar.');
        }
      };

      const loadLetterFromDb = async (id) => {
        if (!db) return;
        try {
          const snapshot = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('letters').doc(id).get();
          if (snapshot.exists) {
            const data = snapshot.data();
            setSenderName(data.senderName || '');
            setReceiverName(data.receiverName || '');
            setLetterContent(data.letterContent || '');
            setSelectedTheme(THEMES.find(t => t.id === data.themeId) || THEMES[0]);
            setSelectedFont(data.font || 'font-serif');
            setDisplayMode(data.displayMode || 'traditional');
            setCustomImageUrl(data.customImageUrl || '');
            setEnvelopeStyle(data.envelopeStyle || ENVELOPE_COLORS[0].id);
            setCardStyle(data.cardStyle || CARD_COLORS[0].id);
            setIsRecipientView(true);
            setEnvelopeOpened(false);
            showToast('Carta carregada!');
          }
        } catch (err) {
          showToast('Erro ao baixar dados.');
        }
      };

      const downloadInteractiveCard = () => {
        if (!letterContent) return;
        const htmlContent = `
        <!DOCTYPE html>
        <html>
        <head>
          <meta charset="UTF-8">
          <script src="https://cdn.tailwindcss.com"><\/script>
          <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Playfair+Display&family=Plus+Jakarta+Sans&family=Cinzel&family=Sacramento&family=Montserrat&family=Caveat&display=swap" rel="stylesheet">
          <style>
            .font-serif { font-family: 'Playfair Display', Georgia, serif; }
            .font-mono { font-family: 'JetBrains Mono', Courier, monospace; }
            .font-sans { font-family: 'Plus Jakarta Sans', sans-serif; }
            .font-cinzel { font-family: 'Cinzel', serif; }
            .font-sacramento { font-family: 'Sacramento', cursive; }
            .font-montserrat { font-family: 'Montserrat', sans-serif; }
            .font-caveat { font-family: 'Caveat', cursive; }
          </style>
        </head>
        <body class="${selectedTheme.bgClass} flex items-center justify-center min-h-screen p-4">
          <div class="max-w-xl w-full ${cardStyle} p-8 text-center">
            <h2 class="text-2xl font-bold mb-4">Para: ${receiverName || 'Especial'}</h2>
            ${customImageUrl ? `<img src="${customImageUrl}" class="w-full max-h-56 object-cover rounded-xl mb-4"/>` : ''}
            <p class="${selectedFont} text-lg leading-relaxed whitespace-pre-line">${letterContent}</p>
            <p class="mt-4 italic opacity-60">De: ${senderName || 'Anônimo'}</p>
          </div>
        </body>
        </html>`;
        const element = document.createElement("a");
        element.href = URL.createObjectURL(new Blob([htmlContent], { type: 'text/html' }));
        element.download = `Correio_Virtual_${receiverName || 'Especial'}.html`;
        document.body.appendChild(element);
        element.click();
        document.body.removeChild(element);
      };

      const copyShareLink = () => {
        if (!currentLetterId) return;
        const link = `${window.location.origin}${window.location.pathname}#/letter/${currentLetterId}`;
        navigator.clipboard.writeText(link)
          .then(() => {
            setCopySuccess(true);
            showToast('Link copiado!');
            setTimeout(() => setCopySuccess(false), 2000);
          })
          .catch(() => showToast('Erro ao copiar link automaticamente.'));
      };

      const showToast = (message) => {
        setToast({ show: true, message });
        setTimeout(() => setToast({ show: false, message: '' }), 4000);
      };

      const getSlides = () => letterContent.split('\n\n').filter(p => p.trim() !== '');

      return (
        <div className="relative min-h-screen flex flex-col justify-between overflow-x-hidden">
          <canvas ref={canvasRef} className="fixed inset-0 pointer-events-none z-0" />
          <div className={`fixed inset-0 -z-10 transition-all duration-1000 ${selectedTheme.bgClass}`} />

          {toast.show && (
            <div className="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 flex items-center gap-2 px-5 py-3 rounded-full shadow-2xl bg-slate-900 text-white text-sm">
              <Sparkles /> <span>{toast.message}</span>
            </div>
          )}

          <header className="relative z-10 px-6 py-4 flex items-center justify-between bg-white/10 backdrop-blur-md border-b border-white/10 text-white shadow-md">
            <div className="flex items-center gap-3">
              <div className="bg-white/20 p-2 rounded-xl"><Heart className="w-6 h-6 text-rose-500 fill-rose-500 animate-pulse" /></div>
              <div>
                <h1 className="font-extrabold text-lg tracking-wider">Correio Virtual</h1>
                <p className="text-xs opacity-75">Crie mensagens que encantam corações</p>
              </div>
            </div>
            <div className="flex items-center gap-2">
              <input 
                type="file" 
                ref={fileInputRef} 
                onChange={handleAudioUpload} 
                accept="audio/*" 
                className="hidden" 
              />
              <button 
                onClick={toggleAudioPlay} 
                className="bg-white/20 hover:bg-white/30 p-2.5 rounded-full text-white transition flex items-center gap-1.5 text-xs font-semibold max-w-xs"
                title={audioFileName || "Fazer upload de música"}
              >
                {isPlayingAudio ? <Volume2 /> : <VolumeX />}
                <span className="truncate max-w-[120px]">
                  {audioFileName ? (isPlayingAudio ? 'Pausar' : 'Tocar Ambiência') : 'Adicionar Fundo Musical'}
                </span>
              </button>
              {isRecipientView && (
                <button onClick={() => { setIsRecipientView(false); }} className="bg-white/20 hover:bg-white/30 text-xs px-4 py-2 rounded-xl font-bold flex items-center gap-1 transition">
                  <Settings /> Voltar ao Editor
                </button>
              )}
            </div>
          </header>

          {isRecipientView ? (
            <main className="relative z-10 flex-grow flex items-center justify-center p-4">
              {!envelopeOpened ? (
                <div onClick={handleEnvelopeOpenClick} className={`group cursor-pointer relative max-w-lg w-full aspect-[4/3] rounded-3xl shadow-2xl p-6 border-4 flex flex-col justify-between items-center transition-transform hover:scale-105 duration-300 ${envelopeStyle}`}>
                  <div className="absolute top-0 inset-x-0 h-1/2 bg-black/5 rounded-b-[100px] shadow-inner flex justify-center items-start pt-4">
                    <div className="bg-rose-500 p-3 rounded-full text-white shadow-lg"><Heart className="w-8 h-8 fill-white text-white" /></div>
                  </div>
                  <div className="mt-28 text-center">
                    <span className="text-xs uppercase tracking-widest font-semibold opacity-75">Mensagem Especial Recebida</span>
                    <h3 className="text-2xl font-serif mt-2">Para: <span className="font-extrabold underline">{receiverName || 'Alguém Especial'}</span></h3>
                  </div>
                  <div className="text-center text-xs font-medium flex items-center gap-1 animate-bounce opacity-80">Clique para abrir o envelope <ChevronRight /></div>
                </div>
              ) : (
                <div className={`max-w-2xl w-full ${cardStyle} p-6 md:p-10 relative`}>
                  <div className="absolute -top-12 right-0 flex gap-2 items-center">
                    <button onClick={downloadInteractiveCard} className="bg-white text-slate-800 border px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-1.5 shadow-lg"><Download /> Baixar HTML</button>
                  </div>

                  <div className="border-b border-current/20 pb-4 mb-6 flex justify-between items-end">
                    <div><span className="text-xs uppercase opacity-70">Para</span><h4 className="text-xl font-bold">{receiverName || 'Alguém Especial'}</h4></div>
                    {senderName && <div className="text-right"><span className="text-xs opacity-70 uppercase">De</span><h4 className="text-lg font-semibold italic">~{senderName}</h4></div>}
                  </div>

                  {customImageUrl && <div className="mb-6 rounded-2xl overflow-hidden shadow-lg"><img src={customImageUrl} className="w-full max-h-64 object-cover" /></div>}

                  {displayMode === 'traditional' && <div className={`${selectedFont} text-lg md:text-xl leading-relaxed whitespace-pre-line text-center py-4`}>{letterContent || 'Nenhuma mensagem escrita ainda...'}</div>}

                  {displayMode === 'slides' && (
                    <div className="min-h-[200px] flex flex-col justify-between py-4">
                      <div className={`text-center ${selectedFont} text-lg md:text-xl leading-relaxed`}>{getSlides()[currentSlide] || 'Nenhum parágrafo separado.'}</div>
                      <div className="flex justify-between items-center mt-6 pt-4 border-t border-current/10">
                        <button disabled={currentSlide === 0} onClick={() => setCurrentSlide(p => Math.max(0, p - 1))} className="p-2 rounded-xl bg-current/5 disabled:opacity-30"><ChevronLeft /></button>
                        <span className="text-xs font-semibold">Slide {currentSlide + 1} de {getSlides().length}</span>
                        <button disabled={currentSlide >= getSlides().length - 1} onClick={() => setCurrentSlide(p => Math.min(getSlides().length - 1, p + 1))} className="p-2 rounded-xl bg-current/5 disabled:opacity-30"><ChevronRight /></button>
                      </div>
                    </div>
                  )}

                  {displayMode === 'gradual' && (
                    <div className="min-h-[150px] text-center py-4">
                      <div className={`${selectedFont} text-lg md:text-xl leading-relaxed whitespace-pre-line`}>{letterContent.substring(0, revealedChars)}</div>
                    </div>
                  )}
                </div>
              )}
            </main>
          ) : (
            <main className="relative z-10 flex-grow max-w-7xl mx-auto w-full px-4 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
              <div className="lg:col-span-7 bg-white/95 rounded-3xl shadow-xl p-6 border flex flex-col gap-6">
                <div className="border-b pb-4 flex justify-between items-center">
                  <div>
                    <h3 className="text-xl font-bold text-slate-800">Escreva sua Mensagem</h3>
                    <p className="text-xs text-slate-500">Personalize cada detalhe da sua declaração</p>
                  </div>
                  <button onClick={() => setIsRecipientView(true)} className="bg-rose-50 text-rose-600 px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-1.5"><Eye /> Visualizar</button>
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Para:</label>
                    <input type="text" value={receiverName} onChange={(e) => setReceiverName(e.target.value)} placeholder="Nome do destinatário" className="w-full bg-slate-50 border rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-rose-400 focus:outline-none" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-500 mb-1">De:</label>
                    <input type="text" value={senderName} onChange={(e) => setSenderName(e.target.value)} placeholder="Em branco para Anônimo" className="w-full bg-slate-50 border rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-rose-400 focus:outline-none" />
                  </div>
                </div>

                <div>
                  <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Mensagem da Carta:</label>
                  <textarea value={letterContent} onChange={(e) => { setLetterContent(e.target.value); setIsSaved(false); }} rows={6} placeholder="Abra seu coração..." className="w-full bg-slate-50 border rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-rose-400 focus:outline-none font-serif leading-relaxed" />
                </div>

                <div>
                  <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Anexar Imagem Decorativa (Do seu Dispositivo):</label>
                  <div className="flex items-center gap-3 mt-1">
                    <input 
                      type="file" 
                      accept="image/*" 
                      onChange={handleImageDeviceUpload} 
                      className="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-semibold file:bg-rose-50 file:text-rose-700 hover:file:bg-rose-100 cursor-pointer" 
                    />
                    {customImageUrl && (
                      <button onClick={() => setCustomImageUrl('')} className="text-xs text-red-500 underline">Remover</button>
                    )}
                  </div>
                  {customImageUrl && (
                    <div className="mt-2 text-center">
                      <span className="text-[10px] text-emerald-600 font-semibold">✓ Imagem carregada localmente com sucesso!</span>
                    </div>
                  )}
                </div>

                <div className="border-t pt-4 flex flex-col sm:flex-row gap-3">
                  <button onClick={saveLetter} className="flex-grow bg-rose-500 hover:bg-rose-600 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 transition shadow-md"><Check /> Salvar Carta Online</button>
                  {isSaved && <button onClick={copyShareLink} className="bg-slate-900 text-white font-bold py-3 px-6 rounded-xl flex items-center justify-center gap-2 transition">{copySuccess ? <Check /> : <Share2 />} {copySuccess ? 'Copiado!' : 'Copiar Link'}</button>}
                </div>
              </div>

              <div className="lg:col-span-5 flex flex-col gap-6">
                
                {/* NOVO: Configurações de Cores do Envelope e Carta */}
                <div className="bg-white/95 rounded-3xl shadow-xl p-5 border space-y-4">
                  <div>
                    <h3 className="text-xs font-bold text-slate-800 uppercase mb-2 flex items-center gap-1.5">✉️ Cor do Envelope</h3>
                    <div className="grid grid-cols-1 gap-1.5">
                      {ENVELOPE_COLORS.map(env => (
                        <button key={env.id} onClick={() => setEnvelopeStyle(env.id)} className={`py-2 px-3 text-xs rounded-xl border text-left flex justify-between items-center ${envelopeStyle === env.id ? 'border-rose-500 bg-rose-50 font-bold' : 'border-slate-100 bg-slate-50'}`}>
                          <span>{env.name}</span>
                          <div className={`w-4 h-4 rounded-full border border-black/10 ${env.id.split(' ')[0]}`} />
                        </button>
                      ))}
                    </div>
                  </div>

                  <div>
                    <h3 className="text-xs font-bold text-slate-800 uppercase mb-2 flex items-center gap-1.5">📄 Estilo e Cor da Carta</h3>
                    <div className="grid grid-cols-1 gap-1.5">
                      {CARD_COLORS.map(card => (
                        <button key={card.id} onClick={() => setCardStyle(card.id)} className={`py-2 px-3 text-xs rounded-xl border text-left flex justify-between items-center ${cardStyle === card.id ? 'border-rose-500 bg-rose-50 font-bold' : 'border-slate-100 bg-slate-50'}`}>
                          <span>{card.name}</span>
                          <div className={`w-4 h-4 rounded border border-black/10 ${card.id.split(' ')[0]}`} />
                        </button>
                      ))}
                    </div>
                  </div>
                </div>

                <div className="bg-white/95 rounded-3xl shadow-xl p-5 border">
                  <h3 className="text-xs font-bold text-slate-800 uppercase mb-3 flex items-center gap-1.5"><Layers /> Tema de Fundo (Partículas)</h3>
                  <div className="grid grid-cols-1 gap-2">
                    {THEMES.map((theme) => (
                      <button key={theme.id} onClick={() => setSelectedTheme(theme)} className={`p-3 rounded-2xl border text-left flex items-center justify-between ${selectedTheme.id === theme.id ? 'border-rose-500 ring-2 ring-rose-200' : 'border-slate-100'}`}>
                        <span className="text-xs font-bold text-slate-800">{theme.name}</span>
                        <div className={`w-6 h-6 rounded-full ${theme.bgClass}`} />
                      </button>
                    ))}
                  </div>
                </div>

                <div className="bg-white/95 rounded-3xl shadow-xl p-5 border space-y-4">
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-500 mb-2">Tipografia (Fonte):</label>
                    <div className="grid grid-cols-2 gap-2">
                      {FONTS.map(f => <button key={f.id} onClick={() => setSelectedFont(f.id)} className={`py-1.5 text-xs rounded-xl border text-center ${selectedFont === f.id ? 'border-rose-500 bg-rose-50 font-bold' : 'border-slate-100'}`}>{f.name}</button>)}
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-500 mb-2">Formato de Exibição:</label>
                    <div className="grid grid-cols-3 gap-2">
                      <button onClick={() => setDisplayMode('traditional')} className={`py-1.5 text-xs rounded-xl border ${displayMode === 'traditional' ? 'border-rose-500 bg-rose-50 font-bold' : 'border-slate-100'}`}>📃 Normal</button>
                      <button onClick={() => setDisplayMode('slides')} className={`py-1.5 text-xs rounded-xl border ${displayMode === 'slides' ? 'border-rose-500 bg-rose-50 font-bold' : 'border-slate-100'}`}>🎴 Slides</button>
                      <button onClick={() => setDisplayMode('gradual')} className={`py-1.5 text-xs rounded-xl border ${displayMode === 'gradual' ? 'border-rose-500 bg-rose-50 font-bold' : 'border-slate-100'}`}>✍️ Tipo</button>
                    </div>
                  </div>
                </div>

                <div className="bg-white/95 rounded-3xl shadow-xl p-5 border">
                  <h3 className="text-xs font-bold text-slate-800 uppercase mb-3 flex items-center gap-1.5"><FileText /> Minhas Cartas Recentes</h3>
                  {userLetters.length === 0 ? (
                    <p className="text-xs text-slate-400 italic text-center py-2">Nenhuma carta arquivada.</p>
                  ) : (
                    <div className="max-h-40 overflow-y-auto space-y-2">
                      {userLetters.map(l => (
                        <div key={l.id} className="p-2.5 bg-slate-50 rounded-xl flex items-center justify-between border text-xs">
                          <span className="truncate font-bold text-slate-700">Para: {l.receiverName || 'Alguém'}</span>
                          <button onClick={() => loadLetterFromDb(l.id)} className="bg-rose-500 text-white p-1 rounded-lg"><Eye /></button>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            </main>
          )}

          <footer className="relative z-10 py-4 text-center text-xs text-white/70 bg-black/15 mt-8 backdrop-blur-sm">
            <p>© 2026 Correio Virtual</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
