<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L&B Correio Elegante</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    /* Configuração manual das fontes personalizadas do formulário */
    .font-serif { font-family: 'Playfair Display', serif; }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
    .font-sans { font-family: 'Plus Jakarta Sans', sans-serif; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
  </style>
</head>
<body>

  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Mock das ferramentas de ícones Lucide para rodar direto no HTML público
    const Heart = () => <span className="inline-block text-xl">❤️</span>;
    const Sparkles = () => <span className="inline-block text-lg">✨</span>;
    const Volume2 = () => <span className="inline-block text-sm">🔊</span>;
    const VolumeX = () => <span className="inline-block text-sm">🔇</span>;
    const Share2 = () => <span className="inline-block text-sm">🔗</span>;
    const Download = () => <span className="inline-block text-sm">💾</span>;
    const Languages = () => <span className="inline-block text-sm">🌐</span>;
    const Wand2 = () => <span className="inline-block text-sm">🪄</span>;
    const Play = () => <span className="inline-block text-sm">▶️</span>;
    const Pause = () => <span className="inline-block text-sm">⏸️</span>;
    const FileText = () => <span className="inline-block text-sm">📄</span>;
    const Layers = () => <span className="inline-block text-sm">🥞</span>;
    const Check = () => <span className="inline-block text-sm">✅</span>;
    const Eye = () => <span className="inline-block text-sm">👁️</span>;
    const ChevronRight = () => <span className="inline-block text-sm">➡️</span>;
    const ChevronLeft = () => <span className="inline-block text-sm">⬅️</span>;
    const Settings = () => <span className="inline-block text-sm">⚙️</span>;
    const Loader2 = () => <span className="inline-block animate-spin text-sm">⏳</span>;

    const THEMES = [
      {
        id: 'romantic',
        name: 'Amor Eterno',
        bgClass: 'bg-gradient-to-tr from-rose-500 via-pink-600 to-red-400',
        cardStyle: 'bg-white/95 text-rose-900 border-pink-200 shadow-2xl shadow-rose-500/30',
        particleColor: '#ff4d6d',
        font: 'font-serif',
        btnColor: 'bg-rose-500 hover:bg-rose-600 text-white'
      },
      {
        id: 'friendship',
        name: 'Amizade Radiante',
        bgClass: 'bg-gradient-to-tr from-amber-400 via-orange-500 to-yellow-400',
        cardStyle: 'bg-amber-50/95 text-amber-950 border-amber-200 shadow-2xl shadow-orange-500/20',
        particleColor: '#f77f00',
        font: 'font-sans',
        btnColor: 'bg-amber-500 hover:bg-amber-600 text-white'
      },
      {
        id: 'galaxy',
        name: 'Espaço Sideral (Anônimo)',
        bgClass: 'bg-gradient-to-tr from-slate-900 via-indigo-950 to-purple-900',
        cardStyle: 'bg-slate-900/90 text-purple-200 border-purple-800 shadow-2xl shadow-indigo-500/40 backdrop-blur-md',
        particleColor: '#a78bfa',
        font: 'font-mono',
        btnColor: 'bg-purple-600 hover:bg-purple-700 text-white'
      }
    ];

    function App() {
      const [senderName, setSenderName] = useState('');
      const [receiverName, setReceiverName] = useState('');
      const [letterContent, setLetterContent] = useState('');
      const [selectedTheme, setSelectedTheme] = useState(THEMES[0]);
      const [selectedFont, setSelectedFont] = useState('font-serif');
      const [displayMode, setDisplayMode] = useState('traditional');
      const [customImageUrl, setCustomImageUrl] = useState('');
      const [isRecipientView, setIsRecipientView] = useState(false);
      const [envelopeOpened, setEnvelopeOpened] = useState(false);
      const [toast, setToast] = useState({ show: false, message: '' });

      const showToast = (message) => {
        setToast({ show: true, message });
        setTimeout(() => setToast({ show: false, message: '' }), 3000);
      };

      return (
        <div className={`relative min-h-screen ${selectedTheme.bgClass} flex flex-col justify-between transition-all duration-1000 p-4 md:p-6`}>
          
          {toast.show && (
            <div className="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 flex items-center gap-2 px-5 py-3 rounded-full shadow-xl bg-slate-900 text-white text-sm font-medium">
              <Sparkles /> <span>{toast.message}</span>
            </div>
          )}

          <header className="w-full max-w-6xl mx-auto bg-white/10 backdrop-blur-md border border-white/20 rounded-2xl px-6 py-4 flex items-center justify-between text-white shadow-lg mb-6">
            <div className="flex items-center gap-3">
              <div className="bg-white/20 p-2 rounded-xl"><Heart /></div>
              <div>
                <h1 className="font-extrabold text-lg tracking-wider">L&B Correio Elegante</h1>
                <p className="text-xs opacity-75">Mensagens apaixonantes e personalizadas</p>
              </div>
            </div>
            {isRecipientView && (
              <button onClick={() => setIsRecipientView(false)} className="bg-white/20 hover:bg-white/30 text-xs px-4 py-2 rounded-xl font-bold transition flex items-center gap-1">
                <Settings /> Voltar ao Editor
              </button>
            )}
          </header>

          {isRecipientView ? (
            <main className="flex-grow flex items-center justify-center w-full max-w-xl mx-auto">
              {!envelopeOpened ? (
                <div onClick={() => setEnvelopeOpened(true)} className="cursor-pointer w-full aspect-[4/3] bg-gradient-to-br from-amber-50 to-amber-100 rounded-3xl shadow-2xl p-6 border-4 border-amber-200 flex flex-col justify-between items-center transition-transform hover:scale-105 duration-300 relative">
                  <div className="absolute top-0 inset-x-0 h-1/2 bg-amber-200/40 rounded-b-[100px] flex justify-center items-start pt-4">
                    <div className="bg-rose-500 p-3 rounded-full text-white shadow-lg"><Heart /></div>
                  </div>
                  <div className="mt-24 text-center">
                    <span className="text-xs uppercase tracking-widest text-amber-800 font-bold">Carta Recebida</span>
                    <h3 className="text-2xl font-serif mt-2 text-stone-800">Para: <span className="font-extrabold underline">{receiverName || 'Alguém Especial'}</span></h3>
                  </div>
                  <div className="text-xs text-amber-700 font-medium flex items-center gap-1 animate-bounce">Clique para abrir 📬</div>
                </div>
              ) : (
                <div className={`w-full ${selectedTheme.cardStyle} p-6 md:p-10 rounded-3xl border transition-all duration-500 relative`}>
                  <div className="border-b border-current/20 pb-4 mb-6 flex justify-between items-center">
                    <div>
                      <span className="text-xs uppercase opacity-70">Para</span>
                      <h4 className="text-xl font-bold">{receiverName || 'Alguém Especial'}</h4>
                    </div>
                    {senderName && (
                      <div className="text-right">
                        <span className="text-xs uppercase opacity-70">De</span>
                        <h4 className="text-lg font-semibold italic">{senderName}</h4>
                      </div>
                    )}
                  </div>
                  {customImageUrl && (
                    <img src={customImageUrl} className="w-full max-h-64 object-cover rounded-2xl mb-4 shadow-md" />
                  )}
                  <div className={`${selectedFont} text-lg md:text-xl leading-relaxed whitespace-pre-line text-center py-4`}>
                    {letterContent || 'Escreva sua mensagem no editor para visualizá-la aqui.'}
                  </div>
                </div>
              )}
            </main>
          ) : (
            <main className="flex-grow max-w-6xl mx-auto w-full grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
              
              <div className="lg:col-span-7 bg-white/95 rounded-3xl shadow-2xl p-6 flex flex-col gap-5">
                <div>
                  <h3 className="text-xl font-bold text-slate-800">Crie seu Cartão</h3>
                  <p className="text-xs text-slate-500">Insira as informações básicas da sua mensagem</p>
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Para:</label>
                    <input type="text" value={receiverName} onChange={(e) => setReceiverName(e.target.value)} placeholder="Nome do destinatário" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-rose-400" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-500 mb-1">De:</label>
                    <input type="text" value={senderName} onChange={(e) => setSenderName(e.target.value)} placeholder="Anônimo se vazio" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-rose-400" />
                  </div>
                </div>

                <div>
                  <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Mensagem Emocionante:</label>
                  <textarea value={letterContent} onChange={(e) => setLetterContent(e.target.value)} rows={6} placeholder="Abra seu coração aqui..." className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-rose-400 leading-relaxed font-serif" />
                </div>

                <div>
                  <label className="block text-xs font-bold uppercase text-slate-500 mb-1">URL de Imagem ou GIF de Fundo (Opcional):</label>
                  <input type="text" value={customImageUrl} onChange={(e) => setCustomImageUrl(e.target.value)} placeholder="https://link-da-imagem.com/foto.gif" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2 text-xs focus:outline-none" />
                </div>

                <button onClick={() => { setIsRecipientView(true); setEnvelopeOpened(false); }} className="w-full bg-rose-500 hover:bg-rose-600 text-white font-bold py-3 px-6 rounded-xl flex items-center justify-center gap-2 transition shadow-lg shadow-rose-500/20">
                  <Eye /> Visualizar Modo Carta Impressa
                </button>
              </div>

              <div className="lg:col-span-5 flex flex-col gap-5">
                <div className="bg-white/95 rounded-3xl shadow-xl p-6">
                  <h3 className="text-sm font-bold text-slate-800 uppercase tracking-wider mb-3 flex items-center gap-1.5"><Layers /> Escolha o Estilo Visual</h3>
                  <div className="flex flex-col gap-2">
                    {THEMES.map((theme) => (
                      <button key={theme.id} onClick={() => setSelectedTheme(theme)} className={`w-full p-3 rounded-xl border text-left flex items-center justify-between transition-all ${selectedTheme.id === theme.id ? 'border-rose-500 bg-rose-50/50 ring-2 ring-rose-300' : 'border-slate-100 hover:border-slate-200'}`}>
                        <span className="text-xs font-bold text-slate-700">{theme.name}</span>
                        <div className={`w-6 h-6 rounded-full ${theme.bgClass} border`} />
                      </button>
                    ))}
                  </div>
                </div>

                <div className="bg-white/95 rounded-3xl shadow-xl p-6">
                  <label className="block text-xs font-bold uppercase text-slate-500 mb-2">Estilo da Letra (Fonte):</label>
                  <div className="grid grid-cols-3 gap-2">
                    <button onClick={() => setSelectedFont('font-serif')} className={`py-2 px-1 text-xs rounded-xl border text-center font-serif ${selectedFont === 'font-serif' ? 'border-rose-500 bg-rose-50 text-rose-700 font-bold' : 'border-slate-100'}`}>Serif Clássico</button>
                    <button onClick={() => setSelectedFont('font-sans')} className={`py-2 px-1 text-xs rounded-xl border text-center font-sans ${selectedFont === 'font-sans' ? 'border-rose-500 bg-rose-50 text-rose-700 font-bold' : 'border-slate-100'}`}>Sans Moderno</button>
                    <button onClick={() => setSelectedFont('font-mono')} className={`py-2 px-1 text-xs rounded-xl border text-center font-mono ${selectedFont === 'font-mono' ? 'border-rose-500 bg-rose-50 text-rose-700 font-bold' : 'border-slate-100'}`}>Tech Mono</button>
                  </div>
                </div>
              </div>

            </main>
          )}

          <footer className="w-full text-center text-xs text-white/60 py-4 mt-6">
            <p>© 2026 Love&Bond Correio Elegante - Design Responsivo Tailwind CSS</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
