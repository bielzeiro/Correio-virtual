  <link rel="preconnect" href="https://fonts.googleapis.com">

    .font-montserrat { font-family: 'Montserrat', sans-serif; }
    .font-caveat { font-family: 'Caveat', cursive; }

    @keyframes shake {
      0%, 100% { transform: rotate(0deg); }
      20%, 60% { transform: rotate(-6deg); }
      40%, 80% { transform: rotate(6deg); }
    }
    .animate-shake { animation: shake 0.5s ease-in-out infinite; }

<body class="bg-slate-900 text-slate-800 antialiased min-h-screen overflow-x-hidden">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const firebaseConfig = { 
      apiKey: "", 
      authDomain: "", 
      projectId: "", 
      storageBucket: "", 
      messagingSenderId: "", 
      appId: "" 
    };

    let app, auth, db;
    if (firebaseConfig.apiKey) {
      try {
        app = firebase.initializeApp(firebaseConfig);
        auth = firebase.auth();
        db = firebase.firestore();
      } catch (e) {
        console.error("Erro ao inicializar Firebase:", e);
      }
    }
    const appId = 'correio-elegante-default';
    const apiKey = ""; 

    // Ícones
    const Heart = ({ className = "w-5 h-5" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
    );
    const Sparkles = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="inline-block w-4 h-4 text-yellow-400"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275Z"/></svg>

    const Volume2 = ({ className = "w-4 h-4" }) => (

    const VolumeX = () => (

    const Share2 = () => (

    const Download = () => (

    const Play = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="inline-block w-3.5 h-3.5 text-emerald-400"><polygon points="6 3 20 12 6 21 6 3"/></svg>

    );
    const FileText = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="inline-block w-4 h-4 text-rose-500"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><polyline points="14 2 14 7 20 7"/><line x1="10" x2="14" y1="13" y2="13"/><line x1="10" x2="14" y1="17" y2="17"/><line x1="10" x2="11" y1="9" y2="9"/></svg>
    );
    const Layers = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="inline-block w-4 h-4 text-rose-500"><path d="m12 3-8 4 8 4 8-4-8-4Z"/><path d="m4 12 8 4 8-4"/><path d="m4 16 8 4 8-4"/></svg>
    );
    const Check = ({ className = "w-5 h-5" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><polyline points="20 6 9 17 4 12"/></svg>

    const Eye = () => (

    );
    const ChevronRight = ({ className = "w-4 h-4" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={`inline-block ${className}`}><polyline points="9 18 15 12 9 6"/></svg>

    const ChevronLeft = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="inline-block w-5 h-5"><polyline points="15 18 9 12 15 6"/></svg>
    );
    const Settings = () => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="inline-block w-3.5 h-3.5"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
    );
    const Loader2 = ({ className = "inline-block w-3.5 h-3.5 animate-spin" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><line x1="12" x2="12" y1="2" y2="6"/><line x1="12" x2="12" y1="18" y2="22"/><line x1="4.93" x2="7.76" y1="4.93" y2="7.76"/><line x1="16.24" x2="19.07" y1="16.24" y2="19.07"/><line x1="2" x2="6" y1="12" y2="12"/><line x1="18" x2="22" y1="12" y2="12"/><line x1="4.93" x2="7.76" y1="19.07" y2="16.24"/><line x1="16.24" x2="19.07" y1="7.76" y2="4.93"/></svg>
    );

    const THEMES = [
      { id: 'romantic', name: 'Amor Eterno', bgClass: 'bg-gradient-to-tr from-rose-500 via-pink-600 to-red-400', font: 'font-serif', btnColor: 'bg-rose-500 hover:bg-rose-600' },
      { id: 'cyberpunk', name: 'Futurista Cíber', bgClass: 'bg-gradient-to-tr from-purple-900 via-violet-950 to-fuchsia-900', font: 'font-mono', btnColor: 'bg-fuchsia-600 hover:bg-fuchsia-700' },
      { id: 'sunset', name: 'Pôr do Sol Dourado', bgClass: 'bg-gradient-to-tr from-amber-600 via-orange-500 to-rose-500', font: 'font-sans', btnColor: 'bg-orange-500 hover:bg-orange-600' },
      { id: 'galaxy', name: 'Espaço Sideral', bgClass: 'bg-gradient-to-tr from-slate-900 via-indigo-950 to-purple-900', font: 'font-mono', btnColor: 'bg-purple-600 hover:bg-purple-700' }
    ];

    const FONTS = [
      { id: 'font-serif', name: 'Clássico Serif' },
      { id: 'font-sans', name: 'Moderno Sans' },
      { id: 'font-mono', name: 'Tech Código' },
      { id: 'font-sacramento', name: 'Sacramento Cursiva' },
      { id: 'font-caveat', name: 'Caveat Manuscrita' }
    ];

    const CARD_COLORS = [
      { id: 'bg-white/95 text-slate-900', name: 'Branco Clássico' },
      { id: 'bg-amber-50/95 text-amber-950', name: 'Pergaminho Antigo' },
      { id: 'bg-rose-50/95 text-rose-950', name: 'Rosa Delicado' },
      { id: 'bg-slate-900/90 text-slate-100', name: 'Escuro Profundo' }
    ];

    const OPEN_METHODS = [
      { id: 'rip', name: 'Rasgar Envelope' },
      { id: 'shake', name: 'Balançar para Abrir' },
      { id: 'slide', name: 'Folha saindo para cima' }
    ];

    const ENTER_ANIMATIONS = [
      { id: 'scale', name: 'Zoom Suave', class: 'scale-100 duration-500' },
      { id: 'fade-up', name: 'Subir Flutuando', class: 'translate-y-0 opacity-100 duration-700' },
      { id: 'rotate', name: 'Giro Elegante', class: 'rotate-0 duration-500' }
    ];

    const SPECIAL_EFFECTS = [
      { id: 'sparkles', name: '✨ Brilhos Cintilantes', color: '#fbbf24' },
      { id: 'flowers', name: '🌸 Pétalas de Flores', color: '#f472b6' },
      { id: 'explosions', name: '💥 Explosões de Coração', color: '#ef4444' }
    ];

    function App() {
      const [user, setUser] = useState(null);
      const [userLetters, setUserLetters] = useState([]);
      const [loadingAuth, setLoadingAuth] = useState(true);

      const [senderName, setSenderName] = useState('');
      const [receiverName, setReceiverName] = useState('');
      const [letterContent, setLetterContent] = useState('');
      const [selectedTheme, setSelectedTheme] = useState(THEMES[0]);
      const [selectedFont, setSelectedFont] = useState('font-serif');
      const [cardColor, setCardColor] = useState(CARD_COLORS[0].id);
      const [openMethod, setOpenMethod] = useState('rip');
      const [enterAnim, setEnterAnim] = useState('scale');
      const [specialEffect, setSpecialEffect] = useState('sparkles');
      const [displayMode, setDisplayMode] = useState('traditional'); 
      const [customImageUrl, setCustomImageUrl] = useState('');
      const [isSaved, setIsSaved] = useState(false);
      const [currentLetterId, setCurrentLetterId] = useState('');

      const [isRecipientView, setIsRecipientView] = useState(false);
      const [envelopeOpened, setEnvelopeOpened] = useState(false);
      const [isRipped, setIsRipped] = useState(false);
      const [shakeCount, setShakeCount] = useState(0);
      const [currentSlide, setCurrentSlide] = useState(0);
      const [slideInProp, setSlideInProp] = useState(true);
      const [revealedChars, setRevealedChars] = useState(0);

      const [isTranslating, setIsTranslating] = useState(false);
      const [targetLang, setTargetLang] = useState('en');

      const [isSpeaking, setIsSpeaking] = useState(false);
      const [voiceGender, setVoiceGender] = useState('male'); 
      const [toast, setToast] = useState({ show: false, message: '' });
      const [copySuccess, setCopySuccess] = useState(false);
      
      const canvasRef = useRef(null);
      const mediaInputRef = useRef(null);
      const audioBackgroundRef = useRef(new Audio());

      const [isPlayingAudio, setIsPlayingAudio] = useState(false);
      const [audioFileName, setAudioFileName] = useState('');

      useEffect(() => {
        audioBackgroundRef.current.loop = true;
        return () => audioBackgroundRef.current.pause();
      }, []);

      const playEnvelopeSound = () => {
        try {
          const AudioContext = window.AudioContext || window.webkitAudioContext;
          if (!AudioContext) return;
          const ctx = new AudioContext();
          const bufferSize = ctx.sampleRate * 0.4; 
          const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
          const data = buffer.getChannelData(0);
          for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;

          const noise = ctx.createBufferSource();
          noise.buffer = buffer;
          const filter = ctx.createBiquadFilter();
          filter.type = 'bandpass';
          filter.frequency.setValueAtTime(1000, ctx.currentTime);
          const gain = ctx.createGain();
          gain.gain.setValueAtTime(0.3, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35);

          noise.connect(filter);
          filter.connect(gain);
          gain.connect(ctx.destination);
          noise.start();
        } catch (e) {}
      };

      const handleEnvelopeOpenClick = () => {
        playEnvelopeSound();
        if (openMethod === 'rip') {
          setIsRipped(true);
          setTimeout(() => setEnvelopeOpened(true), 600);
        } else if (openMethod === 'shake') {
          setShakeCount(prev => {
            if (prev >= 3) {
              setTimeout(() => setEnvelopeOpened(true), 400);
              return 4;
            }
            return prev + 1;
          });
        } else {
          setEnvelopeOpened(true);
        }
      };

      const handleMediaUpload = (e) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onloadend = () => {
            setCustomImageUrl(reader.result);
            showToast('Mídia adicionada com sucesso do dispositivo!');
          };
          reader.readAsDataURL(file);
        }
      };

      // --- CANVAS DE EFEITOS ESPECIAIS ---
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        let animationFrameId;

        const resizeCanvas = () => {
          canvas.width = window.innerWidth;
          canvas.height = window.innerHeight;
        };
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let particles = [];
        const currentConfig = SPECIAL_EFFECTS.find(e => e.id === specialEffect) || SPECIAL_EFFECTS[0];

        for (let i = 0; i < 50; i++) {
          particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height + canvas.height,
            size: Math.random() * 8 + 4,
            speedY: -(Math.random() * 1.8 + 0.6),
            speedX: Math.random() * 1.4 - 0.7,
            opacity: Math.random() * 0.6 + 0.3,
            wobble: Math.random() * 100,
            wobbleSpeed: Math.random() * 0.03 + 0.01
          });
        }

        const draw = () => {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          particles.forEach((p) => {
            p.y += p.speedY;
            p.x += p.speedX + Math.sin(p.wobble) * 0.4;
            p.wobble += p.wobbleSpeed;

            if (p.y < -20) {
              p.y = canvas.height + 20;
              p.x = Math.random() * canvas.width;
            }

            ctx.save();
            ctx.globalAlpha = p.opacity;
            ctx.fillStyle = currentConfig.color;

            if (specialEffect === 'explosions') {
              ctx.beginPath();
              const d = p.size * 1.2;
              ctx.moveTo(p.x, p.y + d / 4);
              ctx.quadraticCurveTo(p.x, p.y, p.x + d / 2, p.y);
              ctx.quadraticCurveTo(p.x + d, p.y, p.x + d, p.y + d / 3);
              ctx.quadraticCurveTo(p.x + d, p.y + d * (2/3), p.x + d / 2, p.y + d);
              ctx.quadraticCurveTo(p.x, p.y + d * (2/3), p.x, p.y + d / 3);
              ctx.quadraticCurveTo(p.x, p.y, p.x, p.y + d / 4);
              ctx.closePath();
              ctx.fill();
            } else if (specialEffect === 'flowers') {
              ctx.beginPath();
              ctx.arc(p.x, p.y, p.size / 1.5, 0, Math.PI * 2);
              ctx.arc(p.x + p.size/2, p.y, p.size / 2, 0, Math.PI * 2);
              ctx.arc(p.x - p.size/2, p.y, p.size / 2, 0, Math.PI * 2);
              ctx.fill();
            } else {
              ctx.beginPath();
              ctx.moveTo(p.x, p.y - p.size);
              ctx.lineTo(p.x + p.size/3, p.y - p.size/3);
              ctx.lineTo(p.x + p.size, p.y);
              ctx.lineTo(p.x + p.size/3, p.y + p.size/3);
              ctx.lineTo(p.x, p.y + p.size);
              ctx.closePath();
              ctx.fill();
            }
            ctx.restore();
          });
          animationFrameId = requestAnimationFrame(draw);
        };
        draw();

        return () => {
          cancelAnimationFrame(animationFrameId);
          window.removeEventListener('resize', resizeCanvas);
        };
      }, [specialEffect]);

      // --- REVELAÇÃO GRADUAL ---
      useEffect(() => {
        if (displayMode === 'gradual' && envelopeOpened) {
          setRevealedChars(0);
          const interval = setInterval(() => {
            setRevealedChars((prev) => {
              if (prev >= letterContent.length) {
                clearInterval(interval);
                return letterContent.length;
              }
              return prev + 2;
            });
          }, 50);
          return () => clearInterval(interval);
        }
      }, [displayMode, envelopeOpened, letterContent]);

      // --- CORREÇÃO E ATUALIZAÇÃO SINTETIZADOR DE VOZ MASCULINA ---
      const speakLetterAI = () => {
        if (!letterContent.trim()) {
          showToast('Sem texto para narrar.');
          return;
        }
        if (isSpeaking) {
          window.speechSynthesis.cancel();
          setIsSpeaking(false);
          return;
        }
        
        const utterance = new SpeechSynthesisUtterance(letterContent);
        utterance.lang = targetLang === 'en' ? 'en-US' : (targetLang === 'es' ? 'es-ES' : (targetLang === 'fr' ? 'fr-FR' : 'pt-BR'));
        
        const voices = window.speechSynthesis.getVoices();
        let targetVoice = null;

        if (voiceGender === 'male') {
          // Procura ativamente por indexações masculinas comuns nos motores de TTS
          targetVoice = voices.find(v => v.lang.includes(utterance.lang) && 
            (v.name.toLowerCase().includes('daniel') || 
             v.name.toLowerCase().includes('guy') || 
             v.name.toLowerCase().includes('male') || 
             v.name.toLowerCase().includes('google') && !v.name.toLowerCase().includes('maria')));
        } else {
          targetVoice = voices.find(v => v.lang.includes(utterance.lang) && 
            (v.name.toLowerCase().includes('maria') || 
             v.name.toLowerCase().includes('luciana') || 
             v.name.toLowerCase().includes('female') || 
             v.name.toLowerCase().includes('zira')));
        }

        if (!targetVoice) targetVoice = voices.find(v => v.lang.includes(utterance.lang));
        if (targetVoice) utterance.voice = targetVoice;

        utterance.onend = () => setIsSpeaking(false);
        utterance.onerror = () => setIsSpeaking(false);
        setIsSpeaking(true);
        window.speechSynthesis.speak(utterance);
      };

      const saveLetter = async () => {
        if (!db || !user) {
          setCurrentLetterId('mock-id-' + Math.floor(Math.random() * 10000));
          setIsSaved(true);
          showToast('Link de compartilhamento ativado (Modo de Demonstração)!');
          return;
        }
        try {
          const data = { senderName, receiverName, letterContent, themeId: selectedTheme.id, font: selectedFont, cardColor, openMethod, enterAnim, specialEffect, displayMode, customImageUrl, createdAt: new Date().toISOString() };
          const publicRef = await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('letters').add(data);
          setCurrentLetterId(publicRef.id);
          setIsSaved(true);
          showToast('Carta arquivada na nuvem!');
        } catch (err) {
          showToast('Erro ao salvar no servidor.');
        }
      };

      const copyShareLink = () => {
        const pathId = currentLetterId || 'demo';
        const link = `${window.location.origin}${window.location.pathname}?id=${pathId}`;
        navigator.clipboard.writeText(link)
          .then(() => {
            setCopySuccess(true);
            showToast('Link de compartilhamento copiado!');
            setTimeout(() => setCopySuccess(false), 2000);
          })
          .catch(() => showToast('Falha ao copiar link automaticamente.'));
      };

      const showToast = (message) => {
        setToast({ show: true, message });
        setTimeout(() => setToast({ show: false, message: '' }), 4000);
      };

      const getSlides = () => letterContent.split('\n\n').filter(p => p.trim() !== '');

      const changeSlide = (direction) => {
        setSlideInProp(false);
        setTimeout(() => {
          if (direction === 'next') {
            setCurrentSlide(p => Math.min(getSlides().length - 1, p + 1));
          } else {
            setCurrentSlide(p => Math.max(0, p - 1));
          }
          setSlideInProp(true);
        }, 200);
      };

      return (
        <div className="relative min-h-screen flex flex-col justify-between overflow-x-hidden">
          <canvas ref={canvasRef} className="fixed inset-0 pointer-events-none z-40" />
          <div className={`fixed inset-0 -z-10 transition-all duration-1000 ${selectedTheme.bgClass}`} />

          {toast.show && (
            <div className="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 flex items-center gap-2 px-5 py-3 rounded-full shadow-2xl bg-slate-900 text-white text-sm">
              <Sparkles /> <span>{toast.message}</span>
            </div>
          )}

          <header className="relative z-10 px-6 py-4 flex items-center justify-between bg-white/10 backdrop-blur-md border-b border-white/10 text-white shadow-md">
            <div className="flex items-center gap-3">
              <div className="bg-white/20 p-2 rounded-xl"><Heart className="w-6 h-6 text-rose-500 fill-rose-500 animate-pulse" /></div>
              <div>
                <h1 className="font-extrabold text-lg tracking-wider">L&B Correio Elegante</h1>
                <p className="text-xs opacity-75">Mensagens Interativas</p>
              </div>
            </div>
            <div className="flex items-center gap-2">
              {isRecipientView && (
                <button onClick={() => { setIsRecipientView(false); setEnvelopeOpened(false); setIsRipped(false); setShakeCount(0); }} className="bg-white/20 hover:bg-white/30 text-xs px-4 py-2 rounded-xl font-bold flex items-center gap-1 transition">
                  <Settings /> Voltar ao Editor
                </button>
              )}
            </div>
          </header>

          {isRecipientView ? (
            <main className="relative z-10 flex-grow flex items-center justify-center p-4">
              {!envelopeOpened ? (
                <div 
                  onClick={handleEnvelopeOpenClick} 
                  className={`group cursor-pointer relative max-w-lg w-full aspect-[4/3] bg-amber-100 rounded-3xl shadow-2xl p-6 border-4 border-amber-200 flex flex-col justify-between items-center transition-all duration-500
                    ${openMethod === 'shake' && shakeCount > 0 && shakeCount < 4 ? 'animate-shake' : ''}
                    ${openMethod === 'rip' && isRipped ? 'scale-95 opacity-0 rotate-12' : ''}
                    ${openMethod === 'slide' && envelopeOpened ? '-translate-y-full opacity-0' : ''}
                  `}
                >
                  <div className="absolute top-0 inset-x-0 h-1/2 bg-amber-200/50 rounded-b-[100px] shadow-inner flex justify-center items-start pt-4">
                    <div className="bg-rose-500 p-3 rounded-full text-white shadow-lg"><Heart className="w-8 h-8 fill-white text-white" /></div>
                  </div>
                  <div className="mt-28 text-center">
                    <span className="text-xs uppercase tracking-widest text-amber-800 font-semibold">Método: {OPEN_METHODS.find(m => m.id === openMethod)?.name}</span>
                    <h3 className="text-2xl font-serif mt-2 text-stone-800">Para: <span className="font-extrabold underline">{receiverName || 'Alguém Especial'}</span></h3>
                  </div>
                  <div className="text-center text-xs text-amber-700/80 font-medium animate-bounce">
                    {openMethod === 'rip' && 'Toque para Rasgar o envelope ✉️'}
                    {openMethod === 'shake' && `Toque para sacudir (${shakeCount}/3) 📳`}
                    {openMethod === 'slide' && 'Toque para a carta sair 📄'}
                  </div>
                </div>
              ) : (
                <div 
                  className={`max-w-2xl w-full ${cardColor} p-6 md:p-10 relative border shadow-2xl transition-all rounded-3xl
                    ${enterAnim === 'scale' ? 'scale-100 tracking-normal duration-700' : ''}
                    ${enterAnim === 'fade-up' ? 'translate-y-0 opacity-100 duration-1000' : ''}
                    ${enterAnim === 'rotate' ? 'rotate-0 scale-100 duration-700' : ''}
                  `}
                >
                  <div className="absolute -top-12 right-0 flex gap-2 items-center">
                    <div className="bg-slate-900 text-white rounded-xl p-1 flex items-center gap-1 shadow-lg text-xs">
                      <button onClick={() => setVoiceGender('female')} className={`px-2 py-1 rounded-lg font-bold transition ${voiceGender === 'female' ? 'bg-rose-500 text-white' : 'opacity-60'}`}>♀️ Fem</button>
                      <button onClick={() => setVoiceGender('male')} className={`px-2 py-1 rounded-lg font-bold transition ${voiceGender === 'male' ? 'bg-blue-500 text-white' : 'opacity-60'}`}>♂️ Masc</button>
                    </div>

                    <button onClick={speakLetterAI} className="bg-slate-900 text-white px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-1.5 shadow-lg">
                      {isSpeaking ? <Pause /> : <Play />} {isSpeaking ? 'Pausar' : 'Narrar Voz'}
                    </button>
                  </div>

                  <div className="border-b border-current/20 pb-4 mb-6 flex justify-between items-end">
                    <div><span className="text-xs uppercase opacity-70">Para</span><h4 className="text-xl font-bold">{receiverName || 'Alguém Especial'}</h4></div>
                    {senderName && <div className="text-right"><span className="text-xs opacity-70 uppercase">De</span><h4 className="text-lg font-semibold italic">~{senderName}</h4></div>}
                  </div>

                  {customImageUrl && <div className="mb-6 rounded-2xl overflow-hidden shadow-lg max-h-60"><img src={customImageUrl} className="w-full h-full object-cover" /></div>}

                  {displayMode === 'traditional' && <div className={`${selectedFont} text-lg md:text-xl leading-relaxed whitespace-pre-line text-center py-4`}>{letterContent || 'Nenhuma mensagem escrita...'}</div>}

                  {displayMode === 'slides' && (
                    <div className="min-h-[200px] flex flex-col justify-between py-4">
                      <div className={`text-center ${selectedFont} text-lg md:text-xl leading-relaxed transition-opacity duration-200 ${slideInProp ? 'opacity-100' : 'opacity-0'}`}>
                        {getSlides()[currentSlide] || 'Nenhum parágrafo separado.'}
                      </div>
                      <div className="flex justify-between items-center mt-6 pt-4 border-t border-current/10">
                        <button disabled={currentSlide === 0} onClick={() => changeSlide('prev')} className="p-2 rounded-xl bg-current/5 disabled:opacity-30"><ChevronLeft /></button>
                        <span className="text-xs font-semibold">Slide {currentSlide + 1} de {getSlides().length}</span>
                        <button disabled={currentSlide >= getSlides().length - 1} onClick={() => changeSlide('next')} className="p-2 rounded-xl bg-current/5 disabled:opacity-30"><ChevronRight /></button>
                      </div>
                    </div>
                  )}

                  {displayMode === 'gradual' && (
                    <div className="min-h-[150px] text-center py-4">
                      <div className={`${selectedFont} text-lg md:text-xl leading-relaxed whitespace-pre-line`}>{letterContent.substring(0, revealedChars)}</div>
                    </div>
                  )}
                </div>
              )}
            </main>
          ) : (
            <main className="relative z-10 flex-grow max-w-7xl mx-auto w-full px-4 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
              <div className="lg:col-span-7 bg-white/95 rounded-3xl shadow-xl p-6 border flex flex-col gap-6">
                <div className="border-b pb-4 flex justify-between items-center">
                  <div>
                    <h3 className="text-xl font-bold text-slate-800">Escreva sua Mensagem</h3>
                    <p className="text-xs text-slate-500">Personalize sua declaração interativa</p>
                  </div>
                  <button onClick={() => setIsRecipientView(true)} className="bg-rose-50 text-rose-600 px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-1.5"><Eye /> Visualizar Papelaria</button>
                </div>

                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Para:</label>
                    <input type="text" value={receiverName} onChange={(e) => setReceiverName(e.target.value)} placeholder="Nome do destinatário" className="w-full bg-slate-50 border rounded-xl px-4 py-2 text-sm focus:outline-none" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-500 mb-1">De:</label>
                    <input type="text" value={senderName} onChange={(e) => setSenderName(e.target.value)} placeholder="Em branco para Anônimo" className="w-full bg-slate-50 border rounded-xl px-4 py-2 text-sm focus:outline-none" />
                  </div>
                </div>

                <div>
                  <div className="flex justify-between items-center mb-1">
                    <label className="block text-xs font-bold uppercase text-slate-500">Mensagem (Separe com 2 Enters para Slides):</label>
                    <button onClick={handleTranslateAI} disabled={isTranslating} className="bg-slate-800 text-white px-2 py-1 rounded text-[10px] font-bold flex items-center gap-1">
                      <Languages /> Traduzir para {targetLang.toUpperCase()}
                    </button>
                  </div>
                  <textarea value={letterContent} onChange={(e) => { setLetterContent(e.target.value); setIsSaved(false); }} rows={5} placeholder="Abra seu coração..." className="w-full bg-slate-50 border rounded-2xl px-4 py-3 text-sm focus:outline-none font-serif leading-relaxed" />
                </div>

                <div>
                  <label className="block text-xs font-bold uppercase text-slate-500 mb-1">Anexar Mídia do Dispositivo:</label>
                  <div className="flex items-center gap-3">
                    <button onClick={() => mediaInputRef.current.click()} className="bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-bold py-2 px-4 rounded-xl border transition">
                      📁 Escolher Arquivo de Imagem
                    </button>
                    <input type="file" ref={mediaInputRef} onChange={handleMediaUpload} accept="image/*" className="hidden" />
                    {customImageUrl && <span className="text-[10px] text-emerald-600 font-bold flex items-center gap-1">✓ Carregada com Sucesso</span>}
                  </div>
                </div>

                <div className="border-t pt-4 flex flex-col sm:flex-row gap-3">
                  <button onClick={saveLetter} className="flex-grow bg-rose-500 hover:bg-rose-600 text-white font-bold py-3 rounded-xl flex items-center justify-center gap-2 transition shadow-md"><Check /> Gerar Link de Entrega</button>
                  {isSaved && <button onClick={copyShareLink} className="bg-slate-900 text-white font-bold py-3 px-6 rounded-xl flex items-center justify-center gap-2 transition"><Share2 /> {copySuccess ? 'Copiado!' : 'Copiar Link'}</button>}
                </div>
              </div>

              <div className="lg:col-span-5 flex flex-col gap-6">
                <div className="bg-white/95 rounded-3xl shadow-xl p-5 border space-y-4">
                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-500 mb-2">🎨 Cor Interna do Papel:</label>
                    <div className="grid grid-cols-2 gap-2">
                      {CARD_COLORS.map(c => <button key={c.id} onClick={() => setCardColor(c.id)} className={`py-1.5 text-xs rounded-xl border text-center ${cardColor === c.id ? 'border-rose-500 bg-rose-50 font-bold' : 'border-slate-100'}`}>{c.name}</button>)}
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-500 mb-2">✉️ Como o destinatário vai abrir:</label>
                    <div className="grid grid-cols-1 gap-1.5">
                      {OPEN_METHODS.map(m => <button key={m.id} onClick={() => setOpenMethod(m.id)} className={`py-2 px-3 text-left text-xs rounded-xl border ${openMethod === m.id ? 'border-rose-500 bg-rose-50 font-bold' : 'border-slate-100'}`}>🔹 {m.name}</button>)}
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-500 mb-2">✨ Efeitos Especiais Flutuantes:</label>
                    <div className="grid grid-cols-1 gap-1.5">
                      {SPECIAL_EFFECTS.map(e => <button key={e.id} onClick={() => setSpecialEffect(e.id)} className={`py-2 px-3 text-left text-xs rounded-xl border ${specialEffect === e.id ? 'border-rose-500 bg-rose-50 font-bold' : 'border-slate-100'}`}>{e.name}</button>)}
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-500 mb-2">🎬 Animação de Entrada do Papel:</label>
                    <div className="grid grid-cols-3 gap-1">
                      {ENTER_ANIMATIONS.map(a => <button key={a.id} onClick={() => setEnterAnim(a.id)} className={`py-1.5 text-[10px] rounded-lg border text-center ${enterAnim === a.id ? 'border-rose-500 bg-rose-50 font-bold' : 'border-slate-100'}`}>{a.name}</button>)}
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold uppercase text-slate-500 mb-2">Tipografia & Modo:</label>
                    <div className="grid grid-cols-2 gap-2">
                      <select value={selectedFont} onChange={(e) => setSelectedFont(e.target.value)} className="bg-slate-50 border rounded-xl p-2 text-xs">
                        {FONTS.map(f => <option key={f.id} value={f.id}>{f.name}</option>)}
                      </select>
                      <select value={displayMode} onChange={(e) => setDisplayMode(e.target.value)} className="bg-slate-50 border rounded-xl p-2 text-xs">
                        <option value="traditional">📃 Tradicional</option>
                        <option value="slides">🎴 Modo Slides</option>
                        <option value="gradual">✍️ Máquina Gradual</option>
                      </select>
                    </div>
                  </div>
                </div>
              </div>
            </main>
          )}

          <footer className="relative z-10 py-4 text-center text-xs text-white/70 bg-black/15 mt-8 backdrop-blur-sm">
            <p>© 2026 Love&Bond Correio Elegante - Feito para espalhar sentimentos.</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
