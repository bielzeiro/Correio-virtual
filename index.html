<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>L&B Correio Elegante</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://unpkg.com/lucide@latest"></script>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

  <style>
    .font-serif { font-family: 'Playfair Display', Georgia, serif; }
    .font-mono { font-family: 'JetBrains Mono', Courier, monospace; }
    .font-sans { font-family: 'Plus Jakarta Sans', sans-serif; }
  </style>
</head>
<body class="bg-slate-900 text-slate-800 antialiased min-h-screen">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // CONFIGURAÇÃO DO FIREBASE (Coloque suas credenciais aqui se necessário)
    // ==========================================
    const firebaseConfig = { 
      apiKey: "", 
      authDomain: "", 
      projectId: "", 
      storageBucket: "", 
      messagingSenderId: "", 
      appId: "" 
    };

    // Inicializando Firebase no modo de compatibilidade para script global
    let app, auth, db;
    if (firebaseConfig.apiKey) {
      app = firebase.initializeApp(firebaseConfig);
      auth = firebase.auth();
      db = firebase.firestore();
    }
    const appId = 'correio-elegante-default';
    const apiKey = ""; // Sua chave do Gemini aqui

    // Ícones do Lucide adaptados para uso global no navegador
    const Heart = () => <i data-lucide="heart" className="inline-block w-5 h-5"></i>;
    const Sparkles = () => <i data-lucide="sparkles" className="inline-block w-4 h-4 text-yellow-400"></i>;
    const Volume2 = () => <i data-lucide="volume-2" className="inline-block w-4 h-4"></i>;
    const VolumeX = () => <i data-lucide="volume-x" className="inline-block w-4 h-4"></i>;
    const Share2 = () => <i data-lucide="share-2" className="inline-block w-5 h-5"></i>;
    const Download = () => <i data-lucide="download" className="inline-block w-3.5 h-3.5"></i>;
    const Languages = () => <i data-lucide="languages" className="inline-block w-2.5 h-2.5"></i>;
    const Wand2 = () => <i data-lucide="wand-2" className="inline-block w-4 h-4 text-indigo-500"></i>;
    const Play = () => <i data-lucide="play" className="inline-block w-3.5 h-3.5 text-emerald-400"></i>;
    const Pause = () => <i data-lucide="pause" className="inline-block w-3.5 h-3.5 text-rose-400"></i>;
    const FileText = () => <i data-lucide="file-text" className="inline-block w-4 h-4 text-rose-500"></i>;
    const Layers = () => <i data-lucide="layers" className="inline-block w-4 h-4 text-rose-500"></i>;
    const Check = () => <i data-lucide="check" className="inline-block w-5 h-5"></i>;
    const Eye = () => <i data-lucide="eye" className="inline-block w-3.5 h-3.5"></i>;
    const ChevronRight = () => <i data-lucide="chevron-right" className="inline-block w-4 h-4"></i>;
    const ChevronLeft = () => <i data-lucide="chevron-left" className="inline-block w-5 h-5"></i>;
    const Settings = () => <i data-lucide="settings" className="inline-block w-3.5 h-3.5"></i>;
    const Loader2 = () => <i data-lucide="loader-2" className="inline-block w-3.5 h-3.5 animate-spin"></i>;

    const THEMES = [
      {
        id: 'romantic',
        name: 'Amor Eterno',
        bgClass: 'bg-gradient-to-tr from-rose-500 via-pink-600 to-red-400',
        cardStyle: 'bg-white/95 text-rose-900 border-pink-200 shadow-2xl',
        particleColor: '#ff4d6d',
        font: 'font-serif',
        btnColor: 'bg-rose-500 hover:bg-rose-600 text-white'
      },
      {
        id: 'friendship',
        name: 'Amizade Radiante',
        bgClass: 'bg-gradient-to-tr from-amber-400 via-orange-500 to-yellow-400',
        cardStyle: 'bg-amber-50/95 text-amber-950 border-amber-200 shadow-2xl',
        particleColor: '#f77f00',
        font: 'font-sans',
        btnColor: 'bg-amber-500 hover:bg-amber-600 text-white'
      }
    ];

    function App() {
      const [senderName, setSenderName] = useState('');
      const [receiverName, setReceiverName] = useState('');
      const [letterContent, setLetterContent] = useState('');
      const [selectedTheme, setSelectedTheme] = useState(THEMES[0]);
      const [selectedFont, setSelectedFont] = useState('font-serif');
      const [displayMode, setDisplayMode] = useState('traditional');
      const [customImageUrl, setCustomImageUrl] = useState('');
      const [isPlayingSynth, setIsPlayingSynth] = useState(false);
      const [isRecipientView, setIsRecipientView] = useState(false);
      const [envelopeOpened, setEnvelopeOpened] = useState(false);
      const [aiPrompt, setAiPrompt] = useState('');
      const [aiTone, setAiTone] = useState('romantico');
      const [isGeneratingAI, setIsGeneratingAI] = useState(false);
      const [toast, setToast] = useState({ show: false, message: '' });

      // Atualiza os ícones do Lucide sempre que a tela muda
      useEffect(() => {
        if (window.lucide) window.lucide.createIcons();
      }, [isRecipientView, envelopeOpened, isPlayingSynth]);

      const showToast = (message) => {
        setToast({ show: true, message });
        setTimeout(() => setToast({ show: false, message: '' }), 4000);
      };

      const handleGenerateAI = async () => {
        if (!aiPrompt.trim() || !apiKey) {
          showToast(apiKey ? 'Digite o que quer na carta.' : 'Insira sua chave API do Gemini no código.');
          return;
        }
        setIsGeneratingAI(true);
        try {
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: `Escreva uma mensagem de correio elegante sobre: "${aiPrompt}". Remetente: "${senderName}", Destinatário: "${receiverName}". Tom: ${aiTone}. Retorne apenas a carta, sem introduções.` }] }]
            })
          });
          const result = await response.json();
          const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
          if (text) setLetterContent(text);
        } catch (err) {
          showToast('Erro ao gerar texto com IA.');
        } finally {
          setIsGeneratingAI(false);
        }
      };

      return (
        <div className={`relative min-h-screen flex flex-col justify-between transition-all duration-1000 ${selectedTheme.bgClass}`}>
          
          {toast.show && (
            <div className="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 flex items-center gap-2 px-5 py-3 rounded-full shadow-2xl bg-slate-900 text-white text-sm">
              <Sparkles /> <span>{toast.message}</span>
            </div>
          )}

          <header className="px-6 py-4 flex items-center justify-between bg-white/10 backdrop-blur-md text-white shadow-md">
            <div className="flex items-center gap-3">
              <div className="bg-white/20 p-2 rounded-xl"><Heart /></div>
              <div>
                <h1 className="font-extrabold text-lg tracking-wider">L&B Correio Elegante</h1>
              </div>
            </div>
            {isRecipientView && (
              <button onClick={() => { setIsRecipientView(false); setEnvelopeOpened(false); }} className="bg-white/20 text-xs px-4 py-2 rounded-xl font-bold flex items-center gap-1">
                <Settings /> Voltar ao Editor
              </button>
            )}
          </header>

          {isRecipientView ? (
            <main className="flex-grow flex items-center justify-center p-4">
              {!envelopeOpened ? (
                <div onClick={() => setEnvelopeOpened(true)} className="cursor-pointer max-w-lg w-full aspect-[4/3] bg-amber-50 rounded-3xl shadow-2xl p-6 border-4 border-amber-200 flex flex-col justify-between items-center transform hover:scale-105 transition">
                  <div className="text-center mt-20">
                    <h3 className="text-2xl font-serif text-stone-800">Para: <span className="font-extrabold underline">{receiverName || 'Alguém Especial'}</span></h3>
                  </div>
                  <div className="text-xs text-amber-700 font-semibold animate-bounce mb-4">Clique para abrir o envelope <ChevronRight /></div>
                </div>
              ) : (
                <div className={`max-w-2xl w-full ${selectedTheme.cardStyle} p-8 rounded-3xl border shadow-2xl relative`}>
                  <div className="border-b border-current/20 pb-4 mb-6 flex justify-between items-end">
                    <div>
                      <span className="text-xs uppercase opacity-70 font-bold">Para</span>
                      <h4 className="text-2xl font-extrabold">{receiverName || 'Alguém Especial'}</h4>
                    </div>
                    {senderName && (
                      <div className="text-right">
                        <span className="text-xs uppercase opacity-70 font-bold">De</span>
                        <h4 className="text-xl font-semibold italic">~{senderName}</h4>
                      </div>
                    )}
                  </div>
                  {customImageUrl && <img src={customImageUrl} className="w-full max-h-64 object-cover rounded-2xl mb-6 shadow-md" />}
                  <div className={`${selectedFont} text-lg md:text-xl leading-relaxed whitespace-pre-line text-center py-4`}>
                    {letterContent || 'Nenhuma mensagem escrita ainda...'}
                  </div>
                </div>
              )}
            </main>
          ) : (
            <main className="flex-grow max-w-4xl mx-auto w-full px-4 py-6 grid grid-cols-1 md:grid-cols-12 gap-6 items-start">
              <div className="md:col-span-7 bg-white/95 rounded-3xl shadow-2xl p-6 flex flex-col gap-4">
                <div className="flex justify-between items-center border-b pb-2">
                  <h3 className="text-xl font-bold text-slate-800">Escreva sua Mensagem</h3>
                  <button onClick={() => setIsRecipientView(true)} className="bg-rose-50 text-rose-600 px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-1"><Eye /> Ver Carta</button>
                </div>

                <div className="grid grid-cols-2 gap-4">
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">Para:</label>
                    <input type="text" value={receiverName} onChange={(e) => setReceiverName(e.target.value)} placeholder="Nome de quem recebe" className="w-full bg-slate-50 border rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-rose-400" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-slate-500 mb-1">De:</label>
                    <input type="text" value={senderName} onChange={(e) => setSenderName(e.target.value)} placeholder="Anônimo se vazio" className="w-full bg-slate-50 border rounded-xl px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-rose-400" />
                  </div>
                </div>

                <div className="bg-indigo-50 rounded-2xl p-4 border border-indigo-100">
                  <div className="flex items-center gap-2 mb-2 text-xs font-bold text-indigo-900"><Wand2 /> Gerador de Carta IA</div>
                  <div className="flex gap-2">
                    <input type="text" value={aiPrompt} onChange={(e) => setAiPrompt(e.target.value)} placeholder="Ex: Agradecendo por me fazer rir..." className="flex-grow bg-white border rounded-xl px-3 py-2 text-xs focus:outline-none" />
                    <button onClick={handleGenerateAI} disabled={isGeneratingAI} className="bg-indigo-600 text-white text-xs px-4 py-2 rounded-xl font-bold flex items-center justify-center">
                      {isGeneratingAI ? <Loader2 /> : 'Gerar'}
                    </button>
                  </div>
                </div>

                <div>
                  <label className="block text-xs font-bold text-slate-500 mb-1">Mensagem:</label>
                  <textarea value={letterContent} onChange={(e) => setLetterContent(e.target.value)} rows={5} placeholder="Abra seu coração..." className="w-full bg-slate-50 border rounded-2xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-rose-400 font-serif" />
                </div>

                <div>
                  <label className="block text-xs font-bold text-slate-500 mb-1">URL de Imagem/GIF de Fundo:</label>
                  <input type="text" value={customImageUrl} onChange={(e) => setCustomImageUrl(e.target.value)} placeholder="https://..." className="w-full bg-slate-50 border rounded-xl px-4 py-2 text-xs focus:outline-none" />
                </div>
              </div>

              <div className="md:col-span-5 flex flex-col gap-6">
                <div className="bg-white/95 rounded-3xl shadow-xl p-5 border">
                  <h3 className="text-xs font-bold text-slate-800 uppercase mb-3 flex items-center gap-1.5"><Layers /> Escolha o Tema</h3>
                  <div className="flex flex-col gap-2">
                    {THEMES.map(t => (
                      <button key={t.id} onClick={() => setSelectedTheme(t)} className={`p-3 rounded-2xl border text-left flex items-center justify-between ${selectedTheme.id === t.id ? 'border-rose-500 bg-rose-50' : 'bg-white'}`}>
                        <span className="text-xs font-bold">{t.name}</span>
                        <div className={`w-6 h-6 rounded-full ${t.bgClass}`} />
                      </button>
                    ))}
                  </div>
                </div>
              </div>
            </main>
          )}

          <footer className="py-4 text-center text-xs text-white/70 bg-black/20 backdrop-blur-md">
            <p>© 2026 Love&Bond Correio Elegante - Feito com Amor.</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
